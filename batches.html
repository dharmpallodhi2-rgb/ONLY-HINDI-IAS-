// batches.html के अंदर Crash Course वाला कार्ड बदलें:
<div class="subject-card" onclick="openCrashCourseMenu()">
    <img src="e715c5ba-e3a0-4231-b90c-ee28d4fea405.jpg" style="width:100%; border-bottom: 4px solid #ffaa00;">
    <div style="padding:20px; text-align:center;">
        <b style="color: #3b5098; font-size: 18px;">UPSC Crash Course 2026</b>
        <p style="font-size: 13px; color: #d93838; margin-top: 5px; font-weight: bold;">Start: 12 Jan 2026 ▶</p>
    </div>
</div>

// और subjects-section के नीचे यह नया सेक्शन जोड़ें:
<div id="crash-course-section" style="display:none; padding: 20px;">
    <h2 style="font-size: 16px; color: #3b5098; font-weight: bold; margin-bottom: 15px;">Crash Course Subjects</h2>
    
    <!-- Polity 2026 Button -->
    <div class="subject-card" onclick="window.location.href='Polity2026.html'">
        <div class="subject-info"><b>⚖️ Indian Polity 2026</b><div class="play-badge">14 Lectures ▶</div></div>
    </div>

    <!-- History 2026 Button -->
    <div class="subject-card" onclick="window.location.href='History2026.html'">
        <div class="subject-info"><b>📜 Modern History 2026</b><div class="play-badge">31 Lectures ▶</div></div>
    </div>
</div>

<script>
    // handleBackLogic और नए फंक्शन्स अपडेट करें:
    let currentView = 'main';

    function openCrashCourseMenu() {
        document.getElementById('main-batch-container').style.display = 'none';
        document.getElementById('crash-course-section').style.display = 'block';
        document.getElementById('main-title').innerText = "Crash Course 2026";
        currentView = 'crash';
    }

    function openFoundationMenu() {
        document.getElementById('main-batch-container').style.display = 'none';
        document.getElementById('subjects-section').style.display = 'block';
        document.getElementById('main-title').innerText = "Foundation Subjects";
        currentView = 'foundation';
    }

    function handleBackLogic() {
        if (currentView === 'main') {
            window.location.href = 'index.html';
        } else {
            document.getElementById('subjects-section').style.display = 'none';
            document.getElementById('crash-course-section').style.display = 'none';
            document.getElementById('main-batch-container').style.display = 'block';
            document.getElementById('main-title').innerText = "UPSC Free Batches";
            currentView = 'main';
        }
    }
</script>
