<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPSC Batches - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fce34d; font-family: Arial, sans-serif; padding-bottom: 30px; user-select: none; }
        .top-bar { background-color: #3b5098; color: white; padding: 15px; display: flex; align-items: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: sticky; top: 0; z-index: 10000; }
        .back-btn { background-color: #ffaa00; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-right: 20px; cursor: pointer; }
        .page-title { font-size: 16px; font-weight: bold; margin: 0; flex-grow: 1; text-align: center; padding-right: 40px; }
        #subjects-section { display: none; padding: 20px; }
        .subject-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1); cursor: pointer; margin-bottom: 20px; border: 1px solid #eee; transition: transform 0.2s; }
        .subject-card:active { transform: scale(0.98); }
        .subject-banner img { width: 100%; height: auto; display: block; border-bottom: 3px solid #ffaa00; }
        .subject-info { padding: 15px; display: flex; justify-content: space-between; align-items: center;}
        .subject-info b { font-size: 15px; }
        .play-badge { background: #eef2fb; color: #3b5098; padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div class="top-bar">
        <button class="back-btn" onclick="handleBackLogic()">⬅ Back</button>
        <h1 class="page-title" id="main-title">UPSC Free Batches</h1>
    </div>

    <!-- Foundation Card -->
    <div class="batch-grid" id="main-batch-container" style="padding: 20px;">
        <div class="subject-card" onclick="openFoundationMenu()">
            <img src="b4055760-9313-4a64-b55b-f5784001f48b.jpg" style="width:100%;">
            <div style="padding:15px; text-align:center;"><b>UPSC Foundation Batch 2026</b></div>
        </div>
    </div>

    <!-- Subjects Section -->
    <div id="subjects-section">
        <h2 style="font-size: 16px; margin: 0 0 15px 5px; color: #3b5098;">Foundation Subjects</h2>
        
        <!-- Environment Card -->
        <div class="subject-card" onclick="window.location.href='environment.html'">
            <div class="subject-banner"><img src="https://kgs-v2.akamaized.net/kgs/kgs/video-thumbs/thumb/uploads/W2B8ASFCF3ohW5VYLq9N3iD6WxDQroQHyb1h10nc.jpg"></div>
            <div class="subject-info">
                <div><b>🌿 Environment & Ecology</b><p style="font-size:12px; color:#888;">By Shankar Jha Sir</p></div>
                <div class="play-badge">27 Lectures ▶</div>
            </div>
        </div>

        <!-- Indian Geography Card -->
        <div class="subject-card" onclick="window.location.href='indiangeography.html'">
            <div class="subject-banner"><img src="https://kgs-v2.akamaized.net/kgs/kgs/video-thumbs/thumb/uploads/fyAS6ObKWqyVUobZVQHO1ak56W5e4vslDFgQkgQf.jpg"></div>
            <div class="subject-info">
                <div><b>🇮🇳 Indian Geography</b><p style="font-size:12px; color:#888;">By Sachin Arora Sir</p></div>
                <div class="play-badge">31 Lectures ▶</div>
            </div>
        </div>

        <!-- Indian Polity Card -->
        <div class="subject-card" onclick="window.location.href='polity.html'">
            <div class="subject-banner"><img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg"></div>
            <div class="subject-info">
                <div><b>⚖️ Indian Polity</b><p style="font-size:12px; color:#888;">By Rajesh Mishra Sir</p></div>
                <div class="play-badge">55 Lectures ▶</div>
            </div>
        </div>
    </div>

    <script>
        // Security logic for batches.html
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        let isMenuOpen = false;
        function openFoundationMenu() {
            document.getElementById('main-batch-container').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'block';
            document.getElementById('main-title').innerText = "Foundation Subjects";
            isMenuOpen = true;
        }

        function handleBackLogic() {
            if (isMenuOpen) {
                document.getElementById('subjects-section').style.display = 'none';
                document.getElementById('main-batch-container').style.display = 'block';
                document.getElementById('main-title').innerText = "UPSC Free Batches";
                isMenuOpen = false;
            } else { window.location.href = 'index.html'; }
        }
    </script>
</body>
</html>
