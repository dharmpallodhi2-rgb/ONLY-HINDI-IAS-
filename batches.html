<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Batches - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fce34d; font-family: Arial, sans-serif; padding-bottom: 30px; }
        .top-bar { background-color: #3b5098; color: white; padding: 15px; display: flex; align-items: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .back-btn { background-color: #ffaa00; color: white; text-decoration: none; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-right: 20px; }
        .page-title { font-size: 16px; font-weight: bold; margin: 0; flex-grow: 1; text-align: center; padding-right: 40px; }
        .search-container { padding: 20px; }
        .search-box { width: 100%; padding: 12px; border-radius: 20px; border: none; box-sizing: border-box; font-size: 14px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); }
        .batch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        
        /* लिंक के लिए सेटिंग */
        a { text-decoration: none; color: inherit; display: block; }
        
        .batch-card { background-color: white; border-radius: 10px; overflow: hidden; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1); height: 100%; display: flex; flex-direction: column; }
        .batch-image { height: 90px; background-color: #1b266d; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; }
        .batch-content { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .batch-title { font-size: 11px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .batch-date { font-size: 9px; color: #888; margin-bottom: 12px; }
        .fav-btn { background-color: white; border: 1px solid #1b266d; color: #1b266d; padding: 6px; border-radius: 15px; font-size: 10px; font-weight: bold; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">⬅ Back</a>
        <h1 class="page-title">UPSC Free Batches</h1>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="🔍 Search batches...">
    </div>

    <div class="batch-grid">
        <a href="classroom.html">
            <div class="batch-card">
                <div class="batch-image">🏛️ IAS</div>
                <div class="batch-content">
                    <div class="batch-title">UPSC IAS Foundation Batch (Hindi Medium)</div>
                    <div class="batch-date">Start: 15 May 2026</div>
                    <div class="fav-btn">♡ Add to Favorites</div>
                </div>
            </div>
        </a>

        <div class="batch-card">
            <div class="batch-image" style="background-color: #d93838;">🧮 CSAT</div>
            <div class="batch-content">
                <div class="batch-title">CSAT Target Batch For UPSC Prelims</div>
                <div class="batch-date">Start: 20 May 2026</div>
                <div class="fav-btn">♡ Add to Favorites</div>
            </div>
        </div>
    </div>

</body>
</html>
