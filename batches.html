<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPSC Batches - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fce34d; font-family: Arial, sans-serif; padding-bottom: 30px; }
        .top-bar { background-color: #3b5098; color: white; padding: 15px; display: flex; align-items: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: sticky; top: 0; z-index: 10000; }
        .back-btn { background-color: #ffaa00; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-right: 20px; cursor: pointer; }
        .page-title { font-size: 16px; font-weight: bold; margin: 0; flex-grow: 1; text-align: center; padding-right: 40px; }
        
        /* Subject Cards */
        #subjects-section { display: none; padding: 20px; }
        .subject-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1); cursor: pointer; margin-bottom: 20px; border: 1px solid #eee; }
        .subject-banner img { width: 100%; height: auto; display: block; border-bottom: 3px solid #ffaa00; }
        .subject-info { padding: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        /* Lectures Section */
        #lectures-display-section { display: none; background-color: #f5f6f9; min-height: 100vh;}
        .lecture-header-bar { background-color: #3b5098; padding: 12px 15px; display: flex; align-items: center; color: white; }
        .lecture-back-circle { background-color: #ffaa00; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 12px; font-weight: bold; }
        
        .lecture-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 15px; }
        .lecture-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.08); cursor: pointer; border: 1px solid #eaeaea; display: flex; flex-direction: column; }
        .lecture-img-container { width: 100%; aspect-ratio: 16/9; position: relative;}
        .lecture-img-container img { width: 100%; height: 100%; object-fit: cover; display: block;}
        .lecture-card-content { padding: 10px; flex-grow: 1; }
        .lecture-badge { color: #d93838; font-size: 8px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 5px;}
        .lecture-card-title { font-size: 10px; font-weight: bold; color: #222; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
    </style>
</head>
<body>

    <div class="top-bar" id="main-top-bar">
        <button class="back-btn" onclick="handleSmartBack()">⬅ Back</button>
        <h1 class="page-title">UPSC Free Batches</h1>
    </div>

    <!-- Main Page: Foundation Batch Card (FIXED ONCLICK) -->
    <div class="batch-grid" id="main-batch-grid" style="padding: 20px;">
        <div class="subject-card" onclick="openSubjects()">
            <img src="b4055760-9313-4a64-b55b-f5784001f48b.jpg" style="width:100%; display: block;">
            <div style="padding:15px; text-align:center; background: white;">
                <b style="color: #3b5098;">UPSC Foundation Batch 2026</b>
                <p style="margin: 5px 0 0; font-size: 12px; color: #888;">Hindi Medium (Pre + Mains)</p>
            </div>
        </div>
    </div>

    <!-- Subjects Section (Shows after clicking Foundation Batch) -->
    <div id="subjects-section">
        <h2 style="font-size: 16px; margin: 0 0 15px 5px; color: #3b5098;">Foundation Subjects</h2>

        <div class="subject-card" onclick="showLectures('geography')">
            <div class="subject-banner"><img src="HzAdXJpTo7xOWGJDH3Ex3nvQfy1XsQYdXEVYTFIO.jpg"></div>
            <div class="subject-info">
                <div><b>🌍 World Geography</b><p style="margin:5px 0; font-size:12px; color:#888;">By Sachin Arora Sir</p></div>
                <div style="background:#eef2fb; color:#3b5098; padding:5px 12px; border-radius:15px; font-size:11px; font-weight:bold;">6 Lectures ▶</div>
            </div>
        </div>

        <div class="subject-card" onclick="showLectures('polity')">
            <div class="subject-banner"><img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg"></div>
            <div class="subject-info">
                <div><b>⚖️ Indian Polity</b><p style="margin:5px 0; font-size:12px; color:#888;">By Rajesh Mishra Sir</p></div>
                <div style="background:#eef2fb; color:#3b5098; padding:5px 12px; border-radius:15px; font-size:11px; font-weight:bold;">55 Lectures ▶</div>
            </div>
        </div>
    </div>

    <!-- Lectures Display -->
    <div id="lectures-display-section">
        <div class="lecture-header-bar">
            <div class="lecture-back-circle" onclick="backToSubjects()">⬅</div>
            <h2 id="current-subject-title" style="font-size: 14px; margin: 0; font-weight: bold;"></h2>
        </div>
        <div class="lecture-grid" id="lecture-container"></div>
    </div>

    <script>
        let state = 'main';

        // All 55 Polity Lectures
        const polityData = [
            { id: 1, title: "Lecture 01 || परिचय", url: "https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3-upsc%2Fupsc-hin-batch-05%2Fpolity-rajesh-mishra-sir%2Fpre%2Fl-01%2Fl-01-polity-rajesh-mishra-sir-hin5.m3u8&title=Lecture+-+01+%7C%7C+%E0%A4%AA%E0%A4%B0%E0%A4%AF&section=kgs&source_title=Lecture+-+01+%7C%7C+%E0%A4%AA%E0%A4%B0%E0%A4%AF&parent_title=Indian+Polity+by+Rajesh+Mishra+Sir&item_id=119059&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2F7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg", thumb: "https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg" },
            { id: 2, title: "Lecture 02 || राज्य+ संविधान का परिचय", url: "https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3%2Fsep-2024%2F119418%2Fkgss-1726576283-v119418.m3u8&title=Lecture+-+02+%7C%7C+%E0%A4%B0%E0%A4%BE%E0%A4%9C%E0%A5%8D%E0%A4%AF%2B+%E0%A4%B8%E0%A4%B2+%E0%A4%95%E0%A4%BE+%E0%A4%AA%E0%A4%B0%E0%A4%AF&section=kgs&source_title=Lecture+-+02+%7C%7C+%E0%A4%B0%E0%A4%BE%E0%A4%9C%E0%A5%8D%E0%A4%AF%2B+%E0%A4%B8%E0%A4%B2+%E0%A4%95%E0%A4%BE+%E0%A4%AA%E0%A4%B0%E0%A4%AF&parent_title=Indian+Polity+by+Rajesh+Mishra+Sir&item_id=119237&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2FGPhTlUhwBDnGtewt51TvLSMlZueaz4rHHAfll4US.jpg", thumb: "https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/GPhTlUhwBDnGtewt51TvLSMlZueaz4rHHAfll4US.jpg" },
            { id: 3, title: "Lecture 03 || प्रस्तावना", url: "https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3-upsc%2Fupsc-hin-batch-05%2Fpolity-rajesh-mishra-sir%2Fpre%2Fl-03%2Fl-03-in-polity-rajesh-mishra-hin5.m3u8&title=Lecture+-+03+%7C%7C+%E0%A4%AA%E0%A5%8D%E0%A4%B0%E0%A4%B8%E0%A5%8D%E0%A4%A4%E0%A4%BE%E0%A4%B5%E0%A4%A8%E0%A4%BE&section=kgs&source_title=Lecture+-+03+%7C%7C+%E0%A4%AA%E0%A5%8D%E0%A4%B0%E0%A4%B8%E0%A5%8D%E0%A4%A4%E0%A4%BE%E0%A4%B5%E0%A4%A8%E0%A4%BE&parent_title=Indian+Polity+by+Rajesh+Mishra+Sir&item_id=119774&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2FTQEt8o0ElYSlbB5KJy3JlA249E0Gd9fydpR9QgvX.jpg", thumb: "https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/TQEt8o0ElYSlbB5KJy3JlA249E0Gd9fydpR9QgvX.jpg" },
            { id: 4, title: "Lecture 04 || प्रस्तावना भाग-2", url: "https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3%2Fsep-2024%2F120399%2Fkgss-1726750533-v120399.m3u8&title=Lecture+-+04+%7C%7C+%E0%A4%AA%E0%A5%8D%E0%A4%B0%E0%A4%B8%E0%A5%8D%E0%A4%A4%E0%A4%BE%E0%A4%B5%E0%A4%A8%E0%A4%BE+%E0%A4%AD%E0%A4%BE%E0%A4%97-2&section=kgs&source_title=Lecture+-+04+%7C%7C+%E0%A4%AA%E0%A5%8D%E0%A4%B0%E0%A4%B8%E0%A5%8D%E0%A4%A4%E0%A4%BE%E0%A4%B5%E0%A4%A8%E0%A4%BE+%E0%A4%AD%E0%A4%BE%E0%A4%97-2&parent_title=Indian+Polity+by+Rajesh+Mishra+Sir&item_id=120413&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2FoP00Fb87m5iIC6bTQooeZ0s7igGXvXBpKRtUlCIi.jpg", thumb: "https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/oP00Fb87m5iIC6bTQooeZ0s7igGXvXBpKRtUlCIi.jpg" },
            { id: 5, title: "Lecture 05 || प्रस्तावना, ऐतिहासिक मामले", url: "https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3%2Fsep-2024%2F121041%2Fkgss-1726836272-v121041.m3u8&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2FY5k7B7iC33RlozwSDmUqJu6ajZKHyD3telY98JVT.jpg", thumb: "https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/Y5k7B7iC33RlozwSDmUqJu6ajZKHyD3telY98JVT.jpg" },
            // ... (नील भाई, बाकी 55 तक के डेटा को भी इसी एरे में रखिएगा)
        ];

        // Function to open the foundation subjects section
        function openSubjects() {
            document.getElementById('main-batch-grid').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'block';
            state = 'subjects';
            window.scrollTo(0,0);
        }

        // Function to show lectures of a specific subject
        function showLectures(subject) {
            document.getElementById('main-top-bar').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'none';
            document.getElementById('lectures-display-section').style.display = 'block';
            
            const container = document.getElementById('lecture-container');
            const title = document.getElementById('current-subject-title');
            container.innerHTML = '';

            if(subject === 'polity') {
                title.innerText = "Indian Polity by Rajesh Mishra Sir";
                polityData.forEach(lecture => {
                    container.innerHTML += `
                        <div class="lecture-card" onclick="window.location.href='${lecture.url}'">
                            <div class="lecture-img-container"><img src="${lecture.thumb}"></div>
                            <div class="lecture-card-content">
                                <span class="lecture-badge">▶ CLASS VIDEO</span>
                                <div class="lecture-card-title">${lecture.title}</div>
                            </div>
                        </div>`;
                });
            } else {
                title.innerText = "World Geography by Sachin Arora Sir";
                container.innerHTML = '<p style="padding:20px;">Geography lectures loading...</p>';
            }
            window.scrollTo(0,0);
        }

        function backToSubjects() {
            document.getElementById('lectures-display-section').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'block';
            document.getElementById('main-top-bar').style.display = 'flex';
        }

        function handleSmartBack() {
            if(state === 'subjects') {
                document.getElementById('subjects-section').style.display = 'none';
                document.getElementById('main-batch-grid').style.display = 'block';
                state = 'main';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
