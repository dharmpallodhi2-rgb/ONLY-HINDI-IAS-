<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Batches - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fce34d; font-family: Arial, sans-serif; padding-bottom: 30px; }
        .top-bar { background-color: #3b5098; color: white; padding: 15px; display: flex; align-items: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; position: sticky; top: 0; z-index: 10000; }
        .back-btn { background-color: #ffaa00; color: white; text-decoration: none; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-right: 20px; cursor: pointer; }
        .page-title { font-size: 16px; font-weight: bold; margin: 0; flex-grow: 1; text-align: center; padding-right: 40px; }
        
        #subjects-section { display: none; padding: 20px; }
        .subject-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1); cursor: pointer; margin-bottom: 20px; border: 1px solid #eee; }
        .subject-banner img { width: 100%; height: auto; display: block; border-bottom: 3px solid #ffaa00; }
        .subject-info { padding: 15px; display: flex; justify-content: space-between; align-items: center;}
        
        #lectures-display-section { display: none; background-color: #f5f6f9; min-height: 100vh;}
        .lecture-header-bar { background-color: #3b5098; padding: 12px 15px; display: flex; align-items: center; color: white; }
        .lecture-back-circle { background-color: #ffaa00; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 12px; font-weight: bold; }
        
        .lecture-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 15px; }
        .lecture-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.08); cursor: pointer; border: 1px solid #eaeaea;}
        .lecture-img-container { width: 100%; aspect-ratio: 16/9; position: relative;}
        .lecture-img-container img { width: 100%; height: 100%; object-fit: cover; display: block;}
        .lecture-card-content { padding: 10px; }
        .lecture-badge { color: #d93838; font-size: 8px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 5px;}
        .lecture-card-title { font-size: 11px; font-weight: bold; color: #222; margin: 0; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="top-bar" id="main-top-bar">
        <div class="back-btn" onclick="handleSmartBack()">⬅ Back</div>
        <h1 class="page-title">UPSC Free Batches</h1>
    </div>

    <!-- बैच कार्ड (मेन पेज) -->
    <div class="batch-grid" id="main-batch-grid" style="padding: 20px;">
        <div class="subject-card" onclick="openSubjects()" style="background: white;">
            <img src="b4055760-9313-4a64-b55b-f5784001f48b.jpg" style="width:100%;">
            <div style="padding:15px; text-align:center;"><b>UPSC Foundation Batch 2026</b></div>
        </div>
    </div>

    <!-- सब्जेक्ट्स सेक्शन (फाउंडेशन बैच के अंदर) -->
    <div id="subjects-section">
        <h2 style="font-size: 16px; margin-bottom: 15px; color: #3b5098;">Foundation Subjects</h2>

        <!-- वर्ल्ड जियोग्राफी कार्ड -->
        <div class="subject-card" onclick="showLectures('geography')">
            <div class="subject-banner"><img src="HzAdXJpTo7xOWGJDH3Ex3nvQfy1XsQYdXEVYTFIO.jpg"></div>
            <div class="subject-info">
                <div><b>🌍 World Geography</b><p style="margin:5px 0; font-size:12px; color:#888;">By Sachin Arora Sir</p></div>
                <div style="background:#eef2fb; color:#3b5098; padding:5px 12px; border-radius:15px; font-size:11px; font-weight:bold;">6 Lectures ▶</div>
            </div>
        </div>

        <!-- नया कार्ड: इंडियन पॉलिटी -->
        <div class="subject-card" onclick="showLectures('polity')">
            <div class="subject-banner"><img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg"></div>
            <div class="subject-info">
                <div><b>⚖️ Indian Polity</b><p style="margin:5px 0; font-size:12px; color:#888;">By Rajesh Mishra Sir</p></div>
                <div style="background:#eef2fb; color:#3b5098; padding:5px 12px; border-radius:15px; font-size:11px; font-weight:bold;">1 Lecture ▶</div>
            </div>
        </div>
    </div>

    <!-- लेक्चर्स डिस्प्ले सेक्शन -->
    <div id="lectures-display-section">
        <div class="lecture-header-bar">
            <div class="lecture-back-circle" onclick="backToSubjects()">⬅</div>
            <h2 id="current-subject-title" style="font-size: 14px; margin: 0; font-weight: bold;"></h2>
        </div>

        <div class="lecture-grid" id="lecture-container">
            <!-- लेक्चर्स यहाँ जावास्क्रिप्ट से लोड होंगे -->
        </div>
    </div>

    <script>
        let state = 'main';

        function openSubjects() {
            document.getElementById('main-batch-grid').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'block';
            state = 'subjects';
        }

        function showLectures(subject) {
            document.getElementById('main-top-bar').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'none';
            document.getElementById('lectures-display-section').style.display = 'block';
            
            const container = document.getElementById('lecture-container');
            const title = document.getElementById('current-subject-title');
            container.innerHTML = '';

            if(subject === 'geography') {
                title.innerText = "World Geography by Sachin Arora Sir";
                // यहाँ जियोग्राफी के लेक्चर का कोड डाल सकते हैं
            } 
            else if(subject === 'polity') {
                title.innerText = "Indian Polity by Rajesh Mishra Sir";
                container.innerHTML = `
                    <div class="lecture-card" onclick="window.location.href='https://kgs-web.vercel.app/video-player?url=https%3A%2F%2Fkgs-v1.akamaized.net%2Fkv3-upsc%2Fupsc-hin-batch-05%2Fpolity-rajesh-mishra-sir%2Fpre%2Fl-01%2Fl-01-polity-rajesh-mishra-sir-hin5.m3u8&title=Lecture+-+01+%7C%7C+%E0%A4%AA%E0%A4%B0%E0%A4%BF%E0%A4%9A%E0%A4%AF&section=kgs&source_title=Lecture+-+01+%7C%7C+%E0%A4%AA%E0%A4%B0%E0%A4%BF%E0%A4%9A%E0%A4%AF&parent_title=Indian+Polity+by+Rajesh+Mishra+Sir&item_id=119059&thumb=https%3A%2F%2Fkgs-v2.akamaized.net%2Fkgs%2Fkgs-do%2Fvideo-thumbs%2F7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg'">
                        <div class="lecture-img-container">
                            <img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5.jpg">
                        </div>
                        <div class="lecture-card-content">
                            <span class="lecture-badge">▶ CLASS VIDEO</span>
                            <div class="lecture-card-title">Lecture 01 || परिचय</div>
                        </div>
                    </div>
                `;
            }
        }

        function backToSubjects() {
            document.getElementById('lectures-display-section').style.display = 'none';
            document.getElementById('subjects-section').style.display = 'block';
            document.getElementById('main-top-bar').style.display = 'flex';
        }

        function handleSmartBack() {
            if(state === 'subjects') {
                document.getElementById('subjects-section').style.display = 'none';
                document.getElementById('main-batch-grid').style.display = 'block';
                state = 'main';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
