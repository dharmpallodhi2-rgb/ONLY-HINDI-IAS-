<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #fdf5d6; }
        .header { background-color: #3b5098; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #ffaa00; color: white; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        .tabs { display: flex; justify-content: space-around; background: white; padding: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-item { padding: 8px 15px; border-radius: 5px; font-size: 14px; font-weight: bold; border: 1px solid #ddd; }
        .tab-active { background: #fff; border: 2px solid #ffaa00; color: #ffaa00; }

        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .subject-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .subject-card h3 { margin: 0 0 15px 0; color: #1b266d; font-size: 16px; }
        
        .stats { display: flex; gap: 10px; justify-content: center; }
        .stat-box { background: #fff8e1; border: 1px solid #ffe082; padding: 5px 10px; border-radius: 8px; font-size: 11px; color: #ff9800; cursor: pointer; }

        /* ✨ Safed Pop-up (Modal) Design ✨ */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; position: relative; text-align: center; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 25px; font-weight: bold; color: #333; cursor: pointer; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="batches.html" class="back-btn">← Back</a>
        <span style="font-weight: bold;">UPSC IAS Foundation Batch</span>
    </div>

    <div class="tabs">
        <div class="tab-item">📅 Today's Class</div>
        <div class="tab-item tab-active">📂 Classroom</div>
        <div class="tab-item">🔔 Updates</div>
    </div>

    <div class="subject-grid">
        <div class="subject-card"><h3>History</h3><div class="stats"><div class="stat-box">▶️ 0 Videos</div><div class="stat-box">📄 0 Notes</div></div></div>
        <div class="subject-card"><h3>Polity</h3><div class="stats"><div class="stat-box">▶️ 0 Videos</div><div class="stat-box">📄 0 Notes</div></div></div>
        
        <div class="subject-card" onclick="openVideo()">
            <h3>Geography</h3>
            <div class="stats">
                <div class="stat-box">▶️ 1 Videos</div>
                <div class="stat-box">📄 1 Notes</div>
            </div>
        </div>

        <div class="subject-card"><h3>Economics</h3><div class="stats"><div class="stat-box">▶️ 0 Videos</div><div class="stat-box">📄 0 Notes</div></div></div>
    </div>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <h3 style="color: #1b266d;">Geography Class 01</h3>
            <div class="video-container">
                <iframe id="ytVideo" src="https://www.youtube.com/embed/pUe3MDJgwxI" allowfullscreen></iframe>
            </div>
            <p style="font-size: 12px; color: #666; margin-top: 15px;">Enjoy your learning session!</p>
        </div>
    </div>

    <script>
        function openVideo() {
            document.getElementById("videoModal").style.display = "flex";
        }
        function closeVideo() {
            var modal = document.getElementById("videoModal");
            var iframe = document.getElementById("ytVideo");
            modal.style.display = "none";
            // Video stop karne ke liye src reset karein
            var tempSrc = iframe.src;
            iframe.src = tempSrc;
        }
    </script>

</body>
</html>
