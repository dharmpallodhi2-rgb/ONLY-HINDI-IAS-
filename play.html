<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLY HINDI IAS Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,170,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; z-index: 100; font-family: sans-serif; }
    </style>
</head>
<body oncontextmenu="return false">
    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>
    <div id="video-container" style="width: 100%; height: 100%;"></div>

    <script>
        // URL से वीडियो लिंक निकालना
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('url');
        
        if (videoUrl) {
            const container = document.getElementById('video-container');
            // अगर YouTube लिंक है तो iframe, वरना सीधा वीडियो
            if (videoUrl.includes('youtube.com') || videoUrl.includes('embed')) {
                container.innerHTML = `<iframe src="${videoUrl}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<video controls autoplay style="width:100%; height:100%;"><source src="${videoUrl}" type="application/x-mpegURL">Your browser does not support video.</video>`;
            }
        }

        // Security
        document.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) return false; };
    </script>
</body>
</html>
