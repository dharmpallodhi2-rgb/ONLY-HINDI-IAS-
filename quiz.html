<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Live Quiz - ONLY HINDI IAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-teal: #0B2B40; --premium-gold: #b59410; --white: #ffffff; --light-bg: #f0f4f8; --correct-green: #d4edda; --correct-border: #28a745; --wrong-red: #f8d7da; --wrong-border: #dc3545; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--light-bg); color: var(--primary-teal); padding-bottom: 40px; overflow-x: hidden; }
        
        .header { background: var(--white); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .back-btn { background: var(--light-bg); color: var(--primary-teal); border: none; padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 15px; font-weight: 900; color: var(--primary-teal); text-transform: uppercase; }

        .info-bar { margin: 15px 15px 25px; padding: 20px; background: linear-gradient(135deg, var(--primary-teal) 0%, #153e5c 100%); color: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(11,43,64,0.2); position: relative; overflow: hidden; }
        .info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .question-count { font-size: 15px; font-weight: 800; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 8px; }
        .timer { font-size: 16px; font-weight: 900; color: var(--premium-gold); display: flex; align-items: center; gap: 6px; }
        
        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--premium-gold); border-radius: 10px; transition: width 0.4s ease; }

        .quiz-container { padding: 0 15px; }
        .quiz-box { background: var(--white); border-radius: 20px; padding: 25px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.05); }
        .quiz-question { font-size: 15px; font-weight: 800; color: #222; margin-bottom: 25px; line-height: 1.6; }
        
        .quiz-options { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-btn { background: #fafafa; border: 2px solid #eef2f5; border-radius: 14px; padding: 15px; font-size: 13px; font-weight: 600; color: #444; cursor: pointer; transition: all 0.2s ease; text-align: left; position: relative; display: flex; align-items: flex-start; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .option-text { flex: 1; padding-right: 25px; }
        
        .option-correct { background: var(--correct-green) !important; border-color: var(--correct-border) !important; color: #0f5132 !important; font-weight: 800; }
        .option-correct::after { content: '✔'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #198754; font-weight: 900; }
        .option-wrong { background: var(--wrong-red) !important; border-color: var(--wrong-border) !important; color: #842029 !important; font-weight: 800; }
        .option-wrong::after { content: '✖'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #dc3545; font-weight: 900; }

        #next-btn { display: none; margin-top: 25px; width: 100%; background: linear-gradient(135deg, var(--premium-gold) 0%, #d4a700 100%); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 6px 20px rgba(181, 148, 16, 0.3); }
        
        #result-box { display: none; background: linear-gradient(135deg, #ffffff 0%, #fffdf3 100%); border-radius: 20px; padding: 40px 20px; text-align: center; border: 3px solid var(--premium-gold); margin: 0 15px; }
        .congrats-text { font-size: 26px; font-weight: 900; color: var(--premium-gold); margin: 15px 0 5px; }
        .trophy { font-size: 70px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .score-circle { width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary-teal) 0%, #1d4d6e 100%); color: white; border-radius: 50%; margin: 25px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; border: 6px solid var(--premium-gold); }
        
        .action-btns { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top:20px; }
        .home-btn { background: var(--primary-teal); color: white; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; text-decoration: none; display: block; }
        .retry-btn { background: transparent; color: var(--primary-teal); border: 2px solid var(--primary-teal); padding: 14px; border-radius: 12px; font-weight: 800; text-decoration: none; display: block; }

        .confetti { position: fixed; width: 12px; height: 12px; opacity: 0; z-index: 9999; animation: fall linear forwards; border-radius: 3px; }
        @keyframes fall { 0% { opacity: 1; top: -10%; transform: translateX(0) rotate(0deg); } 100% { opacity: 0; top: 110%; transform: translateX(150px) rotate(1080deg); } }
    </style>
</head>
<body>

    <div class="header">
        <a href="subjects.html" class="back-btn">← Back</a>
        <h1 id="subject-title">UPSC QUIZ</h1>
        <div style="width: 65px;"></div>
    </div>

    <div class="info-bar" id="info-bar">
        <div class="info-top">
            <div class="question-count">Q. <span id="current-q-num">1</span> of <span id="total-q-num">0</span></div>
            <div class="timer">⏱️ <span id="time">00:00</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div class="quiz-container">
        <div class="quiz-box" id="quiz-box">
            <div class="quiz-question" id="question-text">Loading question...</div>
            <div class="quiz-options">
                <button class="option-btn" id="option-a" onclick="checkAnswer('a')"><span class="option-text" id="text-a">Option A</span></button>
                <button class="option-btn" id="option-b" onclick="checkAnswer('b')"><span class="option-text" id="text-b">Option B</span></button>
                <button class="option-btn" id="option-c" onclick="checkAnswer('c')"><span class="option-text" id="text-c">Option C</span></button>
                <button class="option-btn" id="option-d" onclick="checkAnswer('d')"><span class="option-text" id="text-d">Option D</span></button>
            </div>
            <button id="next-btn" onclick="nextQuestion()">NEXT QUESTION →</button>
        </div>

        <div id="result-box">
            <div class="trophy">🏆</div>
            <div class="congrats-text" id="congrats-title">CONGRATULATIONS!</div>
            <div class="score-circle">
                <span id="final-score">0</span><span style="font-size: 20px; color:#ddd;">/</span><span id="final-total" style="font-size: 24px;">0</span>
            </div>
            <p id="performance-msg" style="font-weight: 800; color: var(--primary-teal); margin-top: 15px;">Evaluating your UPSC preparation...</p>
            
            <div class="action-btns">
                <a href="subjects.html" class="home-btn">Finish & Go to Menu</a>
                <a href="#" class="retry-btn" onclick="location.reload()">↻ Retry Exam</a>
            </div>
        </div>
    </div>

    <script>
        // यह डाटाबेस अब 100% Error-Free है (डबल इनवर्टेड कॉमा और सिंगल लाइन का इस्तेमाल किया गया है)
        const quizDatabase = {
            gs1_2025: [
                { q: "1. निवेश के संदर्भ में, निम्नलिखित पर विचार कीजिए:<br>I. बॉन्ड<br>II. प्रतिरक्षा निधियाँ (हेज फंड्स)<br>III. स्टॉक<br>IV. जोखिम पूँजी<br>उपर्युक्त में से कितनों को वैकल्पिक निवेश निधि माना जाता है?", a: "(A) केवल एक", b: "(B) केवल दो", c: "(C) केवल तीन", d: "(D) सभी चार", ans: "b" },
                { q: "2. निम्नलिखित में कौन-कौन से, भारतीय रिज़र्व बैंक की आय के स्रोत हैं?<br>I. सरकारी बॉन्डों का क्रय और विक्रय<br>II. विदेशी मुद्रा का क्रय और विक्रय<br>III. पेंशन निधि प्रबंधन<br>IV. निजी कंपनियों को ऋण देना<br>V. करेंसी नोटों का मुद्रण और वितरण", a: "(A) केवल I और II", b: "(B) II, III और IV", c: "(C) I, III, IV और V", d: "(D) I, II और V", ans: "d" },
                { q: "3. भारत सरकार के संदर्भ में, सूचना पर विचार कीजिए :<br>I. प्रवर्तन निदेशालय : भगोड़ा आर्थिक अपराधी अधिनियम<br>II. राजस्व आसूचना निदेशालय : सीमा शुल्क अधिनियम<br>III. प्रणाली एवं आँकड़ा प्रबंधन महानिदेशालय : वृहत् आँकड़ा विश्लेषण<br>कितनी पंक्तियों में सूचना सही सुमेलित है?", a: "(A) केवल एक", b: "(B) केवल दो", c: "(C) सभी तीन", d: "(D) किसी में नहीं", ans: "b" },
                { q: "4. कथनों पर विचार कीजिए :<br>I. भारतीय रिज़र्व बैंक भारत में सभी सूचीबद्ध कंपनियों को व्यावसायिक उत्तरदायित्व और स्थिरता रिपोर्ट (BRSR) प्रस्तुत करने का अधिदेश करता है।<br>II. BRSR में प्रकटन मुख्यतः गैर-वित्तीय स्वरूप के होते हैं।", a: "(A) केवल I", b: "(B) केवल II", c: "(C) I और II दोनों", d: "(D) न तो I और न ही II", ans: "b" },
                { q: "5. कथन I: भारत में, कुक्कुट पालन और ऊन उत्पादन से प्राप्त आय कर मुक्त है।<br>कथन II: आयकर अधिनियम, 1961 के अधीन ग्रामीण कृषि भूमि पूँजीगत परिसंपत्ति नहीं है।", a: "(A) दोनों सही, II व्याख्या है", b: "(B) दोनों सही, II व्याख्या नहीं है", c: "(C) I सही, II गलत", d: "(D) I गलत, II सही", ans: "d" },
                { q: "6. कथनों पर विचार कीजिए :<br>I. भारत, खनिज सुरक्षा भागीदारी में सदस्य है।<br>II. भारत 30 अति आवश्यक खनिजों में साधन-संपन्न है।<br>III. संसद ने 2023 में अधिनियम में संशोधन कर नीलामी का अधिकार केंद्र को दिया है।", a: "(A) केवल I और II", b: "(B) केवल II और III", c: "(C) केवल I और III", d: "(D) I, II और III", ans: "c" },
                { q: "7. निवेश पर विचार कीजिए :<br>कथन I: स्टॉक-धारकों की तुलना में बॉन्ड धारकों को कम जोखिम रहता है।<br>कथन II: बॉन्ड धारक ऋणदाता होते हैं, स्टॉक-धारक स्वामी।<br>कथन III: पुनर्भुगतान में बॉन्ड धारकों को प्राथमिकता दी जाती है।", a: "(A) II और III सही, दोनों I की व्याख्या करते हैं", b: "(B) II और III सही, एक व्याख्या करता है", c: "(C) एक सही, वह व्याख्या करता है", d: "(D) दोनों गलत", ans: "a" },
                { q: "8. कथनों पर विचार कीजिए :<br>I. वैश्विक इक्विटी विकल्प संविदाओं में भारत का वृहद् अंश है।<br>II. भारत का स्टॉक बाज़ार हांगकांग को पीछे छोड़ चुका है।<br>III. छोटे निवेशकों को चेतावनी देने के लिए कोई नियामक निकाय नहीं है।", a: "(A) केवल I और II", b: "(B) केवल II और III", c: "(C) केवल I और III", d: "(D) I, II और III", ans: "a" },
                { q: "9. चक्रीय अर्थव्यवस्था के बारे में:<br>कथन I: यह ग्रीनहाउस गैसों के उत्सर्जन को कम करती है।<br>कथन II: यह कच्चे माल के प्रयोग को कम करती है।<br>कथन III: यह उत्पादन में अपव्यय को कम करती है।", a: "(A) II और III सही, I की व्याख्या करते हैं", b: "(B) I और II सही, I व्याख्या है", c: "(C) एक सही, व्याख्या करता है", d: "(D) दोनों गलत", ans: "a" },
                { q: "10. पूँजीगत प्राप्तियों के बारे में:<br>I. ये देयता का सृजन करती है या परिसंपत्तियों में कमी लाती हैं।<br>II. उधार-ग्रहण और विनिवेश पूँजीगत प्राप्तियाँ हैं।<br>III. ऋणों पर प्राप्त ब्याज सरकार की देयता का सृजन करता है।", a: "(A) केवल I और II", b: "(B) केवल II और III", c: "(C) केवल I और III", d: "(D) I, II और III", ans: "a" },
                { q: "11. राजा राममोहन राय के बारे में :<br>I. उनमें प्राच्य विश्व के पारम्परिक दार्शनिक सिद्धांतों के प्रति अत्यंत अनुराग और समादर था।<br>II. उनकी कामना थी कि देशवासी तर्कसंगत और वैज्ञानिक दृष्टिकोण अपनाएं।", a: "(A) केवल I", b: "(B) केवल II", c: "(C) I और II दोनों", d: "(D) न तो 1 और न ही II", ans: "a" },
                { q: "12. असहयोग कार्यक्रम के विषय:<br>I. न्यायालयों/विदेशी वस्त्र का बहिष्कार<br>II. अहिंसा का पालन<br>III. उपाधियों का प्रतिधारण<br>IV. पंचायतों की स्थापना", a: "(A) केवल एक", b: "(B) केवल दो", c: "(C) केवल तीन", d: "(D) सभी चार", ans: "c" },
                { q: "13. सिंचाई में काम आने वाला 'अरघट्टा' क्या था?", a: "(A) एक घिरनी से खींचा जाने वाला चमड़े का थैला", b: "(B) एक बड़ा चक्का, जिसकी अराओं पर मिट्टी के पात्र बँधे हों", c: "(C) बैलों द्वारा खींचा जाने वाला बड़ा पात्र", d: "(D) सीधे हाथों से खींचा जाने वाला जल-डोल", ans: "b" },
                { q: "14. प्राचीन भारत में 'मत्तविलास', 'विचित्रचित्त' उपाधियाँ किसने धारण कीं?", a: "(A) महेन्द्रवर्मन प्रथम", b: "(B) सिंहविष्णु", c: "(C) नरसिंहवर्मन प्रथम", d: "(D) सिंहवर्मन", ans: "a" },
                { q: "15. चीनी तीर्थयात्री फाह्यान ने किसके शासनकाल में भारत की यात्रा की?", a: "(A) समुद्रगुप्त", b: "(B) चन्द्रगुप्त द्वितीय", c: "(C) कुमारगुप्त प्रथम", d: "(D) स्कंदगुप्त", ans: "a" },
                { q: "16. श्रीविजय के विरुद्ध सफल सैन्य अभियान का नेतृत्व किसने किया?", a: "(A) अमोघवर्ष (राष्ट्रकूट)", b: "(B) प्रतापरुद्र (काकतीय)", c: "(C) राजेन्द्र प्रथम (चोल)", d: "(D) विष्णुवर्धन (होयसल)", ans: "c" },
                { q: "17. युग्मों पर विचार कीजिए :<br>I. अश्मक : गोदावरी<br>II. कम्बोज : विपास<br>III. अवन्ती : महानदी<br>IV. कोसल : सरयू", a: "(A) केवल एक", b: "(B) केवल दो", c: "(C) केवल तीन", d: "(D) सभी चार", ans: "d" },
                { q: "18. प्रथम गन्धर्व महाविद्यालय (1901) कहाँ स्थापित किया गया था?", a: "(A) दिल्ली", b: "(B) ग्वालियर", c: "(C) उज्जैन", d: "(D) लाहौर", ans: "c" },
                { q: "19. अशोक के अभिलेखों में 'प्रादेशिक', 'राजुक' और 'युक्त' किस स्तर के अधिकारी थे?", a: "(A) ग्राम-स्तरीय", b: "(B) जिला-स्तरीय", c: "(C) प्रांतीय", d: "(D) केन्द्रीय", ans: "b" },
                { q: "20. असहयोग आंदोलन के संबंध में:<br>I. उद्देश्य वैध तरीके से 'स्वराज' प्राप्त करना था।<br>II. इसे चरणों में कार्यान्वित किया जाना था।", a: "(A) केवल I", b: "(B) केवल II", c: "(C) I और II दोनों", d: "(D) न तो I और न ही II", ans: "b" }
            ],
            // आपने कहा था अभी हिस्ट्री में सवाल मत डालो, इसलिए इसे खाली (Coming soon) छोड़ दिया है:
            history: [ { q: "History Questions Coming Soon...", a: "A", b: "B", c: "C", d: "D", ans: "a" } ],

        function checkAnswer(selectedOption) {

                score++;
            } else {
                document.getElementById('option-' + selectedOption).classList.add('option-wrong');
                document.getElementById('option-' + correctOption).classList.add('option-correct');
            }
            document.getElementById('next-btn').style.display = 'block';

        function nextQuestion() {
