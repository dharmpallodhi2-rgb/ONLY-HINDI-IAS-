<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Premium Live Quiz - ONLY HINDI IAS</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GGTXK0V93Z"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-GGTXK0V93Z');</script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary-teal:#0B2B40;--premium-gold:#b59410;--white:#ffffff;--light-bg:#f0f4f8;--correct-green:#d4edda;--correct-border:#28a745;--wrong-red:#f8d7da;--wrong-border:#dc3545;}
body{margin:0;font-family:'Poppins',sans-serif;background-color:var(--light-bg);color:var(--primary-teal);padding-bottom:40px;overflow-x:hidden;}
.header{background:var(--white);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 15px rgba(0,0,0,0.05);position:sticky;top:0;z-index:1000;}
.back-btn{background:var(--light-bg);color:var(--primary-teal);border:none;padding:8px 15px;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;}
.header h1{margin:0;font-size:16px;font-weight:900;color:var(--primary-teal);text-transform:uppercase;}
.info-bar{margin:15px 15px 25px;padding:20px;background:linear-gradient(135deg,var(--primary-teal) 0%,#153e5c 100%);color:white;border-radius:16px;box-shadow:0 10px 25px rgba(11,43,64,0.2);position:relative;overflow:hidden;}
.info-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.question-count{font-size:15px;font-weight:800;background:rgba(255,255,255,0.15);padding:5px 12px;border-radius:8px;}
.timer{font-size:16px;font-weight:900;color:var(--premium-gold);display:flex;align-items:center;gap:6px;}
.progress-container{width:100%;height:6px;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:var(--premium-gold);border-radius:10px;transition:width 0.4s ease;}
.quiz-container{padding:0 15px;}
.quiz-box{background:var(--white);border-radius:20px;padding:25px 20px;box-shadow:0 8px 30px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.05);margin-bottom:20px;}
.quiz-question{font-size:15px;font-weight:800;color:#222;margin-bottom:25px;line-height:1.6;}
.quiz-options{display:grid;grid-template-columns:1fr;gap:12px;}
.option-btn{background:#fafafa;border:2px solid #eef2f5;border-radius:14px;padding:15px;font-size:13px;font-weight:600;color:#444;cursor:pointer;text-align:left;position:relative;display:flex;align-items:flex-start;line-height:1.4;}
.option-correct{background:var(--correct-green)!important;border-color:var(--correct-border)!important;color:#0f5132!important;font-weight:800;}
.option-wrong{background:var(--wrong-red)!important;border-color:var(--wrong-border)!important;color:#842029!important;font-weight:800;}
#next-btn{display:none;margin-top:25px;width:100%;background:linear-gradient(135deg,var(--premium-gold) 0%,#d4a700 100%);color:white;border:none;padding:16px;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(181,148,16,0.3);}
#result-box{display:none;background:linear-gradient(135deg,#ffffff 0%,#fffdf3 100%);border-radius:20px;padding:40px 20px;text-align:center;border:3px solid var(--premium-gold);margin:0 15px;}
.score-circle{width:120px;height:120px;background:var(--primary-teal);color:white;border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;border:6px solid var(--premium-gold);}
</style>
</head>
<body>
<div class="header"><a href="gs1_parts.html" class="back-btn">← Back</a><h1 id="subject-title">UPSC QUIZ</h1><div style="width:65px;"></div></div>
<div class="info-bar" id="info-bar">
<div class="info-top"><div class="question-count">Q. <span id="current-q-num">1</span> of <span id="total-q-num">0</span></div><div class="timer">⏱️ <span id="time">00:00</span></div></div>
<div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
</div>
<div class="quiz-container">
<div class="quiz-box" id="quiz-box">
<div class="quiz-question" id="question-text">डेटा लोड हो रहा है, कृपया प्रतीक्षा करें...</div>
<div class="quiz-options">
<button class="option-btn" id="option-a" onclick="checkAnswer('a')"><span id="text-a">Option A</span></button>
<button class="option-btn" id="option-b" onclick="checkAnswer('b')"><span id="text-b">Option B</span></button>
<button class="option-btn" id="option-c" onclick="checkAnswer('c')"><span id="text-c">Option C</span></button>
<button class="option-btn" id="option-d" onclick="checkAnswer('d')"><span id="text-d">Option D</span></button>
</div>
<button id="next-btn" onclick="nextQuestion()">अगला सवाल →</button>
</div>
<div id="result-box">
<div style="font-size:50px;">🏆</div>
<div id="congrats-title" style="font-size:20px;font-weight:900;color:var(--premium-gold);">शानदार!</div>
<div class="score-circle"><span id="final-score">0</span>/<span id="final-total">0</span></div>
<p id="performance-msg" style="font-weight:800;"></p>
<div style="margin-top:20px;"><a href="gs1_parts.html" style="background:var(--primary-teal);color:white;padding:15px 30px;border-radius:10px;text-decoration:none;display:inline-block;font-weight:800;">Main Menu</a></div>
</div>
</div>

<script src="database.js"></script>

<script>
let currentSubject="";let currentQuestions=[];let currentQIndex=0;let score=0;let timeInSeconds=0;let timerInterval;

// यह फंक्शन तब चलेगा जब Google Sheet से डेटा आ जाएगा
window.startQuizAfterLoading = function() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        currentSubject = urlParams.get("subject") || "gs1_part1";
        
        if (quizDatabase && quizDatabase[currentSubject]) {
            currentQuestions = quizDatabase[currentSubject];
            timeInSeconds = 900;
            document.getElementById("subject-title").innerText = "UPSC QUIZ - " + currentSubject.replace('_', ' ').toUpperCase();
            document.getElementById("total-q-num").innerText = currentQuestions.length;
            startTimer();
            loadQuestion();
        } else {
            document.getElementById("question-text").innerText = "शीट में सवाल नहीं मिले। कृपया 'Subject' कॉलम चेक करें।";
        }
    } catch (e) {
        document.getElementById("question-text").innerText = "लोडिंग एरर। कृपया रिफ्रेश करें।";
    }
};

// अगर पेज लोड होते ही डेटा तैयार है, तो शुरू करें
window.onload = function() {
    if (typeof isDataLoaded !== 'undefined' && isDataLoaded) {
        window.startQuizAfterLoading();
    }
};

function loadQuestion() {
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("current-q-num").innerText = currentQIndex + 1;
    let progressPercent = ((currentQIndex) / currentQuestions.length) * 100;
    document.getElementById("progress-bar").style.width = progressPercent + "%";
    
    const qData = currentQuestions[currentQIndex];
    document.getElementById("question-text").innerText = qData.q;
    document.getElementById("text-a").innerText = qData.a;
    document.getElementById("text-b").innerText = qData.b;
    document.getElementById("text-c").innerText = qData.c;
    document.getElementById("text-d").innerText = qData.d;
    
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => {
        btn.classList.remove("option-correct", "option-wrong");
        btn.disabled = false;
    });
}

function checkAnswer(selectedOption) {
    const correctOption = currentQuestions[currentQIndex].ans;
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedOption === correctOption) {
        document.getElementById("option-" + selectedOption).classList.add("option-correct");
        score++;
    } else {
        document.getElementById("option-" + selectedOption).classList.add("option-wrong");
        document.getElementById("option-" + correctOption).classList.add("option-correct");
    }
    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentQIndex++;
    if (currentQIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        endQuiz();
    }
}

function startTimer() {
    timerInterval = setInterval(function() {
        if (timeInSeconds <= 0) { clearInterval(timerInterval); endQuiz(); }
        else {
            timeInSeconds--;
            let m = Math.floor(timeInSeconds / 60); let s = timeInSeconds % 60;
            document.getElementById("time").innerText = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }
    }, 1000);
}

function endQuiz() {
    clearInterval(timerInterval);
    document.getElementById("quiz-box").style.display = "none";
    document.getElementById("info-bar").style.display = "none";
    document.getElementById("result-box").style.display = "block";
    document.getElementById("final-score").innerText = score;
    document.getElementById("final-total").innerText = currentQuestions.length;
    document.getElementById("performance-msg").innerText = (score/currentQuestions.length > 0.5) ? "अच्छी तैयारी है!" : "मेहनत की ज़रूरत है।";
}
</script>
</body>
</html>
