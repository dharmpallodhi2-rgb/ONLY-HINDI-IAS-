<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONLY HINDI IAS - Lectures</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root{--primary:#3b5098;--accent:#ff0000;--bg:#fcf9f2;--white:#fff}
body{margin:0;font-family:Arial;background:var(--bg)}

/* HEADER */
.header{background:var(--primary);padding:15px;color:#fff;font-weight:bold}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:120px;object-fit:cover}
.title{padding:10px;font-size:13px}

/* PLAYER */
.player-page{display:none;background:black;height:100vh}
video{width:100%;height:70vh;background:black}

.controls{padding:10px;color:white}
button{background:none;border:none;color:white;font-size:18px;margin:5px}
.progress{width:100%;height:5px;background:#555}
.progress-filled{height:5px;background:red;width:0%}
</style>
</head>

<body>

<div id="lecturePage">
<div class="header">Geography Lectures</div>
<div class="grid" id="lecture-list"></div>
</div>

<div id="playerPage" class="player-page">
<button onclick="goBack()">⬅ Back</button>
<video id="video"></video>

<div class="controls">
<div class="progress" onclick="seek(event)">
<div class="progress-filled" id="progressFilled"></div>
</div>

<button onclick="playPause()">▶️</button>
<button onclick="skip(-10)">⏪</button>
<button onclick="skip(10)">⏩</button>

<select onchange="changeSpeed(this.value)">
<option value="1">1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<button onclick="fullscreen()">⛶</button>
</div>
</div>

<script>

/* 🎯 LECTURE DATA */
const lectureData = [
{
title:"Lecture 01 || वायुमंडल की उत्पत्ति",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
thumb:"https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/thumb/uploads/XHYerwLEu25eTAKwmV8ZKZ4V6lkLgfM7t26qBNwc.png"
},
{
title:"Lecture 02 || वायुमंडल की संरचना",
url:"https://www.w3schools.com/html/mov_bbb.mp4",
thumb:"https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/thumb/uploads/PkIHyzIjD91bWwjSDwM2Xon1EwO5vEYi5Vg49hmM.png"
},
{
title:"YouTube Demo",
url:"https://www.youtube.com/watch?v=6ktx6jca710",
thumb:"https://i.ytimg.com/vi/6ktx6jca710/hqdefault.jpg"
}
];

/* 🎯 LOAD LECTURES */
const list = document.getElementById("lecture-list");

lectureData.forEach((item)=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="${item.thumb}">
<div class="title">${item.title}</div>
`;
card.onclick=()=>openPlayer(item.url);
list.appendChild(card);
});

/* 🎬 PLAYER */
const video=document.getElementById("video");
let hls;

function openPlayer(url){

document.getElementById("lecturePage").style.display="none";
document.getElementById("playerPage").style.display="block";

/* YouTube */
if(url.includes("youtube")){
window.open(url);
return;
}

/* HLS */
if(url.endsWith(".m3u8")){
if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}
}else{
video.src=url;
}

video.play();
}

/* CONTROLS */
function playPause(){
if(video.paused) video.play();
else video.pause();
}

function skip(sec){
video.currentTime+=sec;
}

function changeSpeed(s){
video.playbackRate=s;
}

function fullscreen(){
document.documentElement.requestFullscreen();
}

function seek(e){
let percent=e.offsetX/e.target.offsetWidth;
video.currentTime=percent*video.duration;
}

/* PROGRESS */
video.addEventListener("timeupdate",()=>{
let percent=(video.currentTime/video.duration)*100;
document.getElementById("progressFilled").style.width=percent+"%";
});

/* BACK */
function goBack(){
video.pause();
document.getElementById("playerPage").style.display="none";
document.getElementById("lecturePage").style.display="block";
}

/* SECURITY */
document.onkeydown=function(e){
if(e.keyCode==123) return false;
};

</script>

</body>
</html>
