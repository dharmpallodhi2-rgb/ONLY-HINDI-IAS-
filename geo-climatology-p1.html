<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>प्राथमिक जलवायु विज्ञान - ONLY HINDI IAS</title>
<style>
:root{--primary-blue:#3b5098;--accent-yellow:#ffaa00;--bg-app:#fcf9f2;--white:#ffffff;--text-dark:#111}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;background-color:var(--bg-app);font-family:Arial,sans-serif;user-select:none;-webkit-user-select:none}
.header{background:var(--primary-blue);padding:15px;display:flex;align-items:center;color:var(--white);position:sticky;top:0;z-index:1000;border-bottom-left-radius:15px;border-bottom-right-radius:15px}
.back-btn{background:var(--accent-yellow);width:35px;height:35px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;margin-right:15px;font-weight:bold;color:var(--white);text-decoration:none;font-size:18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px}
.card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.06);cursor:pointer;border:1px solid #f0f0f0;display:flex;flex-direction:column;transition:0.2s}
.card:active{transform:scale(0.97)}
.thumb-box{position:relative;width:100%;aspect-ratio:16/9;background:#eee}
.thumb{width:100%;height:100%;object-fit:cover;border-bottom:2px solid var(--accent-yellow)}
.info{padding:12px;display:flex;flex-direction:column;justify-content:space-between;flex-grow:1}
.badge{color:#d97706;font-size:9px;font-weight:800;padding:4px 6px;border-radius:4px;background:#fff3e0;display:inline-flex;align-items:center;margin-bottom:8px;width:fit-content;text-transform:uppercase}
.title{font-size:12px;font-weight:bold;color:var(--text-dark);line-height:1.4;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.date-pill{background:#f3f4f6;color:#6b7280;font-size:10px;font-weight:700;padding:6px 10px;border-radius:20px;display:flex;align-items:center;width:100%}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<header class="header">
<a href="geooptional.html" class="back-btn">⬅</a>
<div style="flex-grow:1">
<b style="font-size:16px;display:block">प्राथमिक जलवायु विज्ञान</b>
<span style="font-size:11px;color:var(--accent-yellow)">Geography Optional • सचिन सर</span>
</div>
</header>

<main class="grid" id="lecture-list"></main>

];

const listContainer = document.getElementById('lecture-list');

lectureLinks.forEach(function(fullLink) {
    let finalActionUrl = "";
    
    // अगर लिंक यूट्यूब का है तो यूट्यूब पर भेजें
    if (fullLink.toLowerCase().includes("youtube.com") || fullLink.toLowerCase().includes("youtu.be")) {
        if (fullLink.includes("url=")) {
            let extracted = decodeURIComponent(fullLink.split("url=")[1].split("&")[0]);
            finalActionUrl = extracted.replace("embed/", "watch?v=");
        } else {
            finalActionUrl = fullLink;
        }
    } else {
        // बाकी सब आपके OHI प्लेयर में खुलेंगे
        finalActionUrl = fullLink.replace("https://kgs-web.vercel.app/video-player", "https://only-hindi-ias.vercel.app/OHIvideoplayer.html");
    }

    let cardTitle = "Lecture Video";
    let cardThumb = "https://kgs-v2.akamaized.net/kgs/kgs/posts/c97f7e70-2ff3-4981-aadf-9a2723e6076b.png";

    try {
        if (fullLink.includes('title=')) {
            cardTitle = decodeURIComponent(fullLink.split('title=')[1].split('&')[0].replace(/\+/g, ' '));
        }
        if (fullLink.includes('thumb=')) {
            cardThumb = decodeURIComponent(fullLink.split('thumb=')[1].split('&')[0]);
        }
    } catch(e) {}

    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = function() { window.location.href = finalActionUrl; };

    card.innerHTML = `
        <div class="thumb-box">
            <img src="${cardThumb}" class="thumb" loading="lazy">
        </div>
        <div class="info">
            <div>
                <span class="badge">${fullLink.includes("youtube") ? "▶ YOUTUBE VIDEO" : "▶ CLASS VIDEO"}</span>
                <div class="title">${cardTitle}</div>
            </div>
            <div class="date-pill">🕒 Recorded • Aug 2025</div>
        </div>`;
    
    listContainer.appendChild(card);
});
</script>
</body>
</html>
