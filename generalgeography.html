<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>General Geography - ONLY HINDI IAS</title>
    <style>
        :root { --primary-blue: #3b5098; --accent-yellow: #ffaa00; --bg-gray: #f5f6f9; --pdf-blue: #2196F3; }
        body { margin: 0; padding: 0; background-color: var(--bg-gray); font-family: 'Segoe UI', Arial, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { background-color: var(--primary-blue); padding: 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-circle { background-color: var(--accent-yellow); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 15px; font-weight: bold; color: white; text-decoration: none; transition: transform 0.2s; }
        .back-circle:active { transform: scale(0.9); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.06); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: transform 0.2s; position: relative; }
        .card:active { transform: scale(0.96); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #ddd; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .badge { font-size: 8px; font-weight: bold; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px; border: 1px solid; }
        .video-badge { color: #d93838; border-color: #d93838; background: #fdf0f0; }
        .pdf-badge { color: var(--pdf-blue); border-color: var(--pdf-blue); background: #e3f2fd; }
        .title { font-size: 10px; font-weight: bold; color: #222; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>

        const list = document.getElementById('geo-list');
        
        lectures.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Thumbnail logic: Handle full URLs and short IDs
            const thumbSrc = l.i.startsWith('http') ? l.i : `https://kgs-v2.akamaized.net/kgs/kgs-do/resized_thumbs/${l.i}`;

            card.onclick = () => {
                const encodedUrl = encodeURIComponent(l.u);
                if(l.type === 'pdf') {
                    // Navigate to PDF viewer (assuming you might have one)
                    window.location.href = `view-pdf.html?url=${encodedUrl}`;
                } else {
                    // Navigate to OHI Video Player
                    window.location.href = `OHIvideoplayer.html?url=${encodedUrl}`;
                }
            };

            card.innerHTML = `
                <div class="thumb-box">
                    <img src="${thumbSrc}" class="thumb" onerror="this.src='https://kgs-v2.akamaized.net/kgs/kgs-do/resized_thumbs/680a0c928dddc.jpg'" loading="lazy">

                    </span>
