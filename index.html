<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLY HINDI IAS - Home</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #fce34d; padding-bottom: 40px; }
        .header { background-color: #1b266d; color: white; padding: 15px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 18px; }
        .profile-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffaa00; object-fit: cover; }
        
        /* लाल ब्लिंक लाइट वाला बैनर */
        .banner-box { position: relative; margin: 15px; padding: 3px; border-radius: 12px; overflow: hidden; border: 2px solid red; animation: red_blink_glow 1.5s ease-in-out infinite; box-shadow: 0 0 10px rgba(255, 0, 0, 0.7); }
        .banner-box img { width: 100%; display: block; border-radius: 9px; }

        @keyframes red_blink_glow {
            0%, 100% { border-color: red; box-shadow: 0 0 8px rgba(255, 0, 0, 0.6); }
            50% { border-color: rgba(255, 0, 0, 0.1); box-shadow: 0 0 18px rgba(255, 0, 0, 0.8); }
        }

        .section-title { padding: 15px 15px 5px; font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; }
        
        /* KGS COURSES */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 5px 15px; }
        .menu-item { background-color: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        .menu-item span { font-size: 22px; display: block; margin-bottom: 5px; }
        .menu-item p { margin: 0; font-size: 11px; font-weight: bold; }

        /* GOVERNANCE Section (Medium Size) */
        .gov-medium-section { margin: 10px 15px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 10px; }
        .gov-img-small { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .gov-info { padding-left: 15px; flex: 1; }
        .gov-info h3 { margin: 0; font-size: 14px; color: #1b266d; }
        .gov-btn-small { display: inline-block; margin-top: 8px; background: #28802e; color: white; padding: 8px 18px; border-radius: 20px; font-size: 11px; text-decoration: none; font-weight: bold; text-transform: uppercase; }

        /* MORE FEATURES Section */
        .more-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 5px 15px; }
        .more-item { background-color: white; border-radius: 10px; padding: 10px 5px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-decoration: none; display: block; }
        .more-item span { font-size: 18px; display: block; margin-bottom: 4px; }
        .more-item p { margin: 0; font-size: 9px; font-weight: bold; }

        /* COMMUNITY Section */
        .community-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px; }
        .comm-card { background-color: white; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        .comm-icon { width: 30px; height: 30px; margin-bottom: 5px; border-radius: 4px; }
        .comm-card p { font-size: 11px; font-weight: bold; color: #1b266d; margin: 0; }
        
        a { text-decoration: none; color: inherit; }
    </style>
</head>
