<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS - Master Edition</title>
    <style>
        /* 🎨 थीम कलर सेटअप (#350EB9) */
        :root {
            --primary-blue: #350EB9;
            --dark-bg: #050a1f;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--dark-bg); 
            color: white; 
            padding-bottom: 40px; 
            overflow-x: hidden; 
        }
        
        .header { 
            background: #000; 
            color: #ffaa00; 
            padding: 20px; 
            border-bottom: 3px solid var(--primary-blue); 
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 5px 25px rgba(53, 14, 185, 0.4); 
        }

        /* 🧊 बैनर के ऊपर कांच वाला इफेक्ट (Glassmorphism) 🧊 */
        .banner-box { 
            position: relative;
            margin: 25px 15px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .banner-box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px); /* हल्का कांच जैसा धुंधलापन */
            pointer-events: none;
        }
        .banner-box img { width: 100%; display: block; }

        /* 📺 स्वागत वाली लाइन (No Change) */
        .news-container { background: #000; padding: 12px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 25px; overflow: hidden; }
        .news-scroll { display: inline-block; white-space: nowrap; padding-left: 100%; animation: newsSlide 15s linear infinite; }
        .news-scroll span { font-size: 16px; font-weight: 800; color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        @keyframes newsSlide { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ✨ बटनों का प्रोफेशनल लुक (#350EB9 के साथ) ✨ */
        .card-grid { padding: 0 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .prof-button {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            overflow: hidden;
            display: block;
            border: 1px solid rgba(53, 14, 185, 0.3);
            backdrop-filter: blur(5px);
        }

        .prof-button::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary-blue));
            animation: rotate-border 4s linear infinite;
        }

        .prof-button::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0a1128;
            border-radius: 16px;
            z-index: 1;
        }

        .btn-content { position: relative; z-index: 2; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        .prof-button span { font-size: 30px; display: block; margin-bottom: 5px; }
        .prof-button p { margin: 0; font-size: 13px; font-weight: bold; color: #ffaa00; text-transform: uppercase; }

        .section-title { padding: 25px 20px 10px; font-size: 12px; font-weight: bold; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px var(--primary-blue); }

        .gov-card { grid-column: span 2; display: flex; align-items: center; text-align: left; padding: 15px; margin-bottom: 10px; }
        .gov-card img { width: 75px; height: 75px; border-radius: 12px; margin-right: 15px; border: 1px solid var(--primary-blue); }
        .btn-action { background: #ffaa00; color: #000; padding: 8px 18px; border-radius: 10px; font-size: 12px; font-weight: 900; display: inline-block; margin-top: 8px; text-decoration: none; }

        /* Other Features */
        .more-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; }
        .more-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px 5px; text-align: center; border: 1px solid rgba(53, 14, 185, 0.2); }
        .more-card p { margin: 0; font-size: 10px; font-weight: bold; color: #ddd; }

        /* Community */
        .comm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 15px; }
        .comm-card { background: white; border-radius: 18px; padding: 15px; text-align: center; text-decoration: none; box-shadow: 0 0 15px rgba(53, 14, 185, 0.2); }
        .comm-card img { width: 35px; height: 35px; margin-bottom: 5px; }
        .comm-card p { margin: 0; font-size: 12px; font-weight: bold; }
    </style>
</head>
