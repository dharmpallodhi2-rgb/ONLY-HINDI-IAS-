<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS - Professional</title>
    <style>
        /* 🎨 डार्क थीम सेटअप */
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #050a1f; color: white; padding-bottom: 40px; }
        
        .header { background: #000; color: #ffaa00; padding: 20px; border-bottom: 3px solid #ffaa00; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 25px rgba(255, 170, 0, 0.3); }
        .header h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        .profile-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ffaa00; }

        .banner-box { margin: 20px 15px; border-radius: 15px; overflow: hidden; border: 1px solid #ffaa00; }
        .banner-box img { width: 100%; display: block; }

        /* 📺 प्रोफेशनल न्यूज़ लाइन */
        .news-container { background: #000; padding: 10px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; overflow: hidden; margin-bottom: 25px; }
        .news-scroll { display: inline-block; white-space: nowrap; padding-left: 100%; animation: newsSlide 18s linear infinite; }
        .news-scroll span { font-size: 15px; font-weight: bold; color: #ff4757; text-shadow: 0 0 8px rgba(255, 71, 87, 0.4); }
        @keyframes newsSlide { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* ✨ प्रोफेशनल एनिमेटेड बटन (The Magic) ✨ */
        .card-container { padding: 0 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .prof-button {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            overflow: hidden;
            border: 1px solid rgba(255, 170, 0, 0.1);
            transition: 0.4s;
            display: block;
        }

        /* बटन के पीछे चलने वाली सुनहरी रोशनी */
        .prof-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ffaa00);
            animation: rotate-border 4s linear infinite;
            z-index: 1;
        }

        /* अंदर का हिस्सा जो रोशनी को ढकता है */
        .prof-button::after {
            content: '';
            position: absolute;
            inset: 3px; /* बॉर्डर की मोटाई */
            background: #0a1128;
            border-radius: 12px;
            z-index: 2;
        }

        /* टेक्स्ट और आइकॉन को ऊपर रखने के लिए */
        .button-content {
            position: relative;
            z-index: 3;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        .prof-button span { font-size: 30px; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 5px #fff); }
        .prof-button p { margin: 0; font-size: 13px; font-weight: bold; color: #ffaa00; text-transform: uppercase; letter-spacing: 1px; }

        /* बटन दबने पर एनीमेशन */
        .prof-button:active { transform: scale(0.95); }

        .section-title { padding: 25px 20px 10px; font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 2px; }

        /* Governance Card - Full Width */
        .gov-card { grid-column: span 2; display: flex; align-items: center; text-align: left; padding: 15px; }
        .gov-card img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; z-index: 3; position: relative; }
        .gov-text { z-index: 3; position: relative; flex: 1; }
        .btn-action { background: #ffaa00; color: #000; padding: 6px 15px; border-radius: 6px; font-size: 11px; font-weight: 900; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ONLY HINDI IAS</h1>
        <img src="1766115476203(2).jpg" class="profile-logo" alt="Logo">
    </div>

    <div class="banner-box">
        <img src="1774704983075.jpg" alt="Banner">
    </div>

    <div class="news-container">
        <div class="news-scroll">
            <span>𝐎𝐍𝐋𝐘 𝐇𝐈𝐍𝐃𝐈 𝐈𝐀𝐒 में आपका स्वागत है... मिशन 968 के लिए तैयार रहें! &nbsp;&nbsp;&nbsp;&nbsp; 🔥 नए नोट्स अपलोड कर दिए गए हैं।</span>
        </div>
    </div>

    <div class="section-title">⚡ QUICK ACCESS</div>
    <div class="card-container">
        <a href="batches.html" class="prof-button">
            <div class="button-content">
                <span>🎓</span>
                <p>KGS Batches</p>
            </div>
        </a>

        <div class="prof-button">
            <div class="button-content">
                <span>❤️</span>
                <p>Favourites</p>
            </div>
        </div>

        <div class="prof-button">
            <div class="button-content">
                <span>⌛</span>
                <p>History</p>
            </div>
        </div>

        <div class="prof-button">
            <div class="button-content">
                <span>⬇️</span>
                <p>Downloads</p>
            </div>
        </div>
    </div>

    <div class="section-title">🏛️ GOVERNANCE</div>
    <div class="card-container">
        <div class="prof-button gov-card">
            <img src="IMG_20260319_163412_254.jpg" alt="Gov">
            <div class="gov-text">
                <b style="font-size: 14px; color: #fff;">GS Paper 2 Notes</b><br>
                <span class="btn-action">OPEN PDF</span>
            </div>
        </div>
    </div>

</body>
</html>
