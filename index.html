<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLY HINDI IAS | Premier Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* प्रोफेशनल डार्क-प्रीमियम थीम */
        :root {
            --brand: #f97316;
            --dark-core: #0f172a;
            --panel: rgba(255, 255, 255, 0.98);
        }

        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            margin: 0;
            overflow-x: hidden;
        }

        /* फिक्स्ड स्प्लैश स्क्रीन */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .brand-logo {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .loader-line {
            width: 240px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loader-progress {
            height: 100%;
            background: var(--brand);
            width: 0%;
            animation: grow 3s cubic-bezier(0.1, 0, 0.2, 1) forwards;
        }

        @keyframes grow { to { width: 100%; } }

        /* प्रोफेशनल कार्ड डिजाइन */
        .glass-dashboard {
            background: var(--panel);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .opt-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #f1f5f9;
        }

        .opt-card:hover:not([disabled]) {
            border-color: var(--brand);
            transform: translateY(-2px);
            background: #fffaf5;
        }

        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="splash-screen">
        <div class="brand-logo uppercase">ONLY <span class="text-orange-500">HINDI</span> IAS</div>
        <p class="text-slate-500 text-[10px] tracking-[0.4em] font-bold mt-2 uppercase">Official Learning App</p>
        <div class="loader-line"><div class="loader-progress"></div></div>
    </div>

    <main id="app-main" class="max-w-xl mx-auto p-4 md:p-6 hidden">
        
        <header class="flex justify-between items-center mb-8 glass-dashboard p-5 rounded-[2rem]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white text-lg">
                    <i class="fa-solid fa-feather-pointed"></i>
                </div>
                <h2 class="text-sm font-black text-slate-800 tracking-tighter uppercase">ONLY HINDI IAS</h2>
            </div>
            <div id="top-score" class="text-orange-600 font-black text-xs bg-orange-50 px-4 py-2 rounded-xl">SCORE: 0</div>
        </header>

        <div id="home-dashboard" class="fade-in">
            <div class="glass-dashboard rounded-[2.5rem] p-10 text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-5 text-9xl"><i class="fa-solid fa-landmark"></i></div>
                <h1 class="text-3xl font-black text-slate-900 leading-tight">GS Paper 1<br><span class="text-orange-500">Practice Set 2026</span></h1>
                <p class="text-slate-400 text-xs mt-4 mb-10 font-bold uppercase tracking-widest">UPSC Standard Questions with Explanations</p>
                <button onclick="initQuiz()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-5 rounded-[1.5rem] shadow-2xl shadow-orange-500/30 transition-all active:scale-95 text-lg">
                    क्विज़ शुरू करें <i class="fa-solid fa-play ml-2"></i>
                </button>
            </div>
        </div>

        <div id="quiz-panel" class="hidden fade-in">
            <div class="mb-4 flex items-center gap-4">
                <div class="flex-1 h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="bar" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="q-count" class="text-[10px] font-black text-slate-400 uppercase">1/20</span>
            </div>

            <div class="glass-dashboard rounded-3xl p-6 mb-4">
                <h3 id="q-text" class="text-lg font-bold text-slate-800 leading-snug"></h3>
            </div>
            
            <div id="opt-grid" class="grid gap-3"></div>

            <div id="exp-panel" class="mt-6 glass-dashboard rounded-3xl p-6 border-l-[6px] border-orange-500 hidden">
                <div class="flex items-center gap-2 mb-3 text-orange-600 font-black text-[10px] uppercase">
                    <i class="fa-solid fa-circle-check"></i> विवरण और व्याख्या
                </div>
                <p id="exp-text" class="text-sm text-slate-600 leading-relaxed italic"></p>
                <button onclick="handleStep()" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">
                    Next Question <i class="fa-solid fa-arrow-right-long ml-2"></i>
                </button>
            </div>
        </div>

        <div id="result-hub" class="hidden glass-dashboard rounded-[2.5rem] p-10 text-center">
            <i class="fa-solid fa-trophy text-orange-500 text-6xl mb-4"></i>
            <h2 class="text-2xl font-black text-slate-900">क्विज़ संपन्न</h2>
            <p class="text-slate-400 text-xs font-bold uppercase mt-1">आपका प्रदर्शन स्कोर</p>
            <div class="my-10 text-8xl font-black text-slate-900" id="final-res">0</div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Try Again</button>
        </div>
    </main>

    <script>
        // 20 Questions Data from GS Paper 1
        const quizRepo = [
            { q: "सिक्किम से गुजरने वाला अक्षांश निम्नलिखित में से किस एक से भी होकर गुजरता है?", options: ["राजस्थान", "पंजाब", "हिमाचल प्रदेश", "जम्मू-कश्मीर"], correct: 0, exp: "मानचित्र के अनुसार, 27° उत्तरी अक्षांश सिक्किम और उत्तरी राजस्थान दोनों से होकर गुजरता है।" },
            { q: "लूनी नदी (Luni River) के संदर्भ में कौन-सा कथन सही है?", options: ["खम्भात की खाड़ी में गिरती है", "कच्छ की खाड़ी में गिरती है", "सिंधु की सहायक नदी है", "कच्छ के रन में लुप्त हो जाती है"], correct: 3, exp: "लूनी नदी एक अंतःस्थलीय अपवाह का उदाहरण है जो कच्छ के रन की दलदली भूमि में लुप्त हो जाती है।" },
            { q: "लाल मिट्टी (Red Soil) के रंग का मुख्य कारण क्या है?", options: ["मैग्नीशियम", "फेरिक ऑक्साइड", "ह्यूमस", "फॉस्फेट"], correct: 1, exp: "फेरिक ऑक्साइड (Ferric Oxide) की उपस्थिति के कारण मिट्टी का रंग लाल होता है।" },
            { q: "निम्नलिखित में से किसका एल्बीडो (Albedo) सबसे अधिक है?", options: ["बालू मरुस्थल", "धान की भूमि", "ताजी बर्फ (Fresh Snow)", "प्रेअरी भूमि"], correct: 2, exp: "ताजी गिरी बर्फ सूर्य के प्रकाश को सबसे अधिक (80-90%) परावर्तित करती है।" },
            { q: "ओशनसैट-2 (Oceansat-2) उपग्रह का मुख्य कार्य क्या है?", options: ["शिक्षा", "मानसून का पूर्वानुमान", "रक्षा", "बैंकिंग"], correct: 1, exp: "यह उपग्रह समुद्र के ऊपर हवा की गति और मानसून की भविष्यवाणी में सहायक है।" },
            { q: "सुनहरा चावल (Golden Rice) में किसकी प्रचुरता होती है?", options: ["विटामिन सी", "विटामिन ए", "विटामिन डी", "विटामिन बी"], correct: 1, exp: "इसे विटामिन ए (प्रो-विटामिन ए) की कमी को पूरा करने के लिए तैयार किया गया है।" },
            { q: "अनुच्छेद 143 के तहत सुप्रीम कोर्ट से सलाह कौन ले सकता है?", options: ["प्रधानमंत्री", "राष्ट्रपति", "मुख्य न्यायाधीश", "राज्यपाल"], correct: 1, exp: "राष्ट्रपति को सार्वजनिक महत्व के कानूनी प्रश्नों पर सुप्रीम कोर्ट से परामर्श लेने का अधिकार है।" },
            { q: "अम्ल वर्षा (Acid Rain) के लिए जिम्मेदार गैसें हैं:", options: ["CO2-O2", "NOx और SO2", "Helium", "Methane"], correct: 1, exp: "नाइट्रोजन और सल्फर के ऑक्साइड वर्षा के जल के साथ मिलकर अम्ल वर्षा का कारण बनते हैं।" },
            { q: "मक्का (Maize) की फसल से क्या उत्पादित किया जा सकता है?", options: ["डीजल", "एथेनॉल (Ethanol)", "केरोसिन", "कोयला"], correct: 1, exp: "मक्का एक ऊर्जा फसल है जिसका उपयोग एथेनॉल के उत्पादन में किया जाता है।" },
            { q: "गांधीजी को चंपारण आने का निमंत्रण किसने दिया था?", options: ["राजेंद्र प्रसाद", "राजकुमार शुक्ल", "नेहरू", "पटेल"], correct: 1, exp: "राजकुमार शुक्ल ने किसानों की समस्या के लिए गांधीजी को चंपारण बुलाया था।" },
            { q: "भारत में थोक मूल्य सूचकांक (WPI) कौन जारी करता है?", options: ["RBI", "नीति आयोग", "वाणिज्य एवं उद्योग मंत्रालय", "वित्त मंत्रालय"], correct: 2, exp: "WPI डेटा वाणिज्य एवं उद्योग मंत्रालय द्वारा मासिक आधार पर जारी किया जाता है।" },
            { q: "कोलेरू झील (Kolleru Lake) कहाँ स्थित है?", options: ["केरल", "तमिलनाडु", "आंध्र प्रदेश", "ओडिशा"], correct: 2, exp: "कोलेरू झील आंध्र प्रदेश में कृष्णा और गोदावरी नदियों के बीच स्थित है।" },
            { q: "1942 के भारत छोड़ो आंदोलन का मुख्य नारा क्या था?", options: ["जय हिन्द", "करो या मरो", "स्वराज", "दिल्ली चलो"], correct: 1, exp: "महात्मा गांधी ने 1942 में 'करो या मरो' का नारा दिया था।" },
            { q: "साइबरनाइफ (Cyberknife) तकनीक किसके उपचार में प्रयुक्त होती है?", options: ["हृदय", "कैंसर (Cancer)", "किडनी", "मस्तिष्क"], correct: 1, exp: "यह कैंसर ट्यूमर के सटीक रेडियोसर्जरी उपचार के लिए एक रोबोटिक तकनीक है।" },
            { q: "एशिया में शहरीकरण की दर सबसे तीव्र कहाँ रही है?", options: ["दक्षिण एशिया", "पूर्वी एशिया", "दक्षिण-पूर्व एशिया", "पश्चिम एशिया"], correct: 1, exp: "UN रिपोर्ट के अनुसार पूर्वी एशिया में शहरीकरण की दर विगत दशकों में बहुत तीव्र रही है।" },
            { q: "भूमध्यसागरीय जलवायु (Mediterranean Climate) की विशेषता है:", options: ["शुष्क शीतकाल", "आर्द्र शीतकाल (Wet Winter)", "वर्ष भर वर्षा", "कोई नहीं"], correct: 1, exp: "यहाँ सर्दियाँ सुहावनी और आर्द्र होती हैं जबकि गर्मियाँ शुष्क रहती हैं।" },
            { q: "इनमें से कौन-सा जीवाणु तेल रिसाव को साफ करने में सहायक है?", options: ["Clostridium", "Pseudomonas", "Agrobacterium", "Nitrosomonas"], correct: 1, exp: "स्यूडोमोनास पुटीडा का उपयोग समुद्र में बिखरे तेल के निवारण के लिए किया जाता है।" },
            { q: "WTO का मुख्यालय (Headquarters) कहाँ है?", options: ["पेरिस", "जिनेवा (Geneva)", "न्यूयॉर्क", "वियना"], correct: 1, exp: "विश्व व्यापार संगठन का मुख्यालय स्विट्जरलैंड के जिनेवा शहर में स्थित है।" },
            { q: "राष्ट्रमंडल (Commonwealth) का सचिवालय कहाँ स्थित है?", options: ["न्यूयॉर्क", "लंदन (London)", "पेरिस", "नई दिल्ली"], correct: 1, exp: "राष्ट्रमंडल का सचिवालय लंदन में स्थित है।" },
            { q: "1905 के स्वदेशी आंदोलन का मुख्य कारण क्या था?", options: ["अकाल", "बंगाल विभाजन", "कर वृद्धि", "तिलक की गिरफ्तारी"], correct: 1, exp: "लॉर्ड कर्जन द्वारा किया गया बंगाल विभाजन स्वदेशी आंदोलन का मुख्य कारण था।" }
        ];

        let idx = 0; let score = 0;

        // फिक्स्ड ऑटो-लोडिंग
        window.onload = () => {
            setTimeout(() => {
                const sp = document.getElementById('splash-screen');
                sp.style.opacity = '0';
                setTimeout(() => {
                    sp.classList.add('hidden');
                    document.getElementById('app-main').classList.remove('hidden');
                }, 800);
            }, 3000);
        };

        function initQuiz() {
            // वॉइस वेलकम यहाँ शिफ्ट किया गया है ताकि यूजर क्लिक के बाद आवाज आए (Browser Policy)
            const msg = new SpeechSynthesisUtterance("Welcome to ONLY HINDI IAS");
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);

            document.getElementById('home-dashboard').classList.add('hidden');
            document.getElementById('quiz-panel').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const d = quizRepo[idx];
            document.getElementById('q-count').innerText = `${idx + 1}/${quizRepo.length}`;
            document.getElementById('bar').style.width = `${((idx + 1) / quizRepo.length) * 100}%`;
            document.getElementById('q-text').innerText = d.q;
            document.getElementById('exp-panel').classList.add('hidden');
            
            const grid = document.getElementById('opt-grid');
            grid.innerHTML = '';
            
            d.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = "opt-card text-left p-5 rounded-2xl font-bold text-slate-700 bg-white shadow-sm";
                b.innerHTML = `<span class="bg-slate-100 px-3 py-1 rounded-lg mr-3 text-[9px] text-slate-400">${String.fromCharCode(65+i)}</span> ${o}`;
                b.onclick = () => select(i, b);
                grid.appendChild(b);
            });
        }

        function select(s, b) {
            const c = quizRepo[idx].correct;
            const btns = document.querySelectorAll('.opt-card');
            btns.forEach(x => x.disabled = true);

            if(s === c) {
                b.classList.add('correct'); score++;
                document.getElementById('top-score').innerText = `SCORE: ${score}`;
            } else {
                b.classList.add('wrong');
                btns[c].classList.add('correct');
            }

            document.getElementById('exp-text').innerText = quizRepo[idx].exp;
            document.getElementById('exp-panel').classList.remove('hidden');
        }

        function handleStep() {
            idx++;
            if(idx < quizRepo.length) renderQ();
            else showFinal();
        }

        function showFinal() {
            document.getElementById('quiz-panel').classList.add('hidden');
            document.getElementById('result-hub').classList.remove('hidden');
            document.getElementById('final-res').innerText = `${score}/${quizRepo.length}`;
        }
    </script>
</body>
</html>
