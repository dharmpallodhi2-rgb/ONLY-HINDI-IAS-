<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS - Login</title>
    <!-- Firebase SDK (Compat Version for stability) -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        /* --- पुराना वाला स्टाइल वैसा ही रहेगा --- */
        body { margin: 0; padding: 0; background-color: #fce34d; font-family: Arial, sans-serif; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        
        /* लॉगिन स्क्रीन का नया स्टाइल (Design matches your theme) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fce34d; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .login-card { background: white; padding: 40px 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 320px; border: 2px solid #3b5098; }
        .login-card h2 { color: #3b5098; margin: 0 0 10px 0; font-size: 22px; }
        .login-card p { color: #666; font-size: 13px; margin-bottom: 25px; font-weight: bold; }
        
        .btn-google { background: white; border: 2px solid #eee; padding: 12px 20px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; font-size: 15px; color: #333; }
        .btn-google:active { transform: scale(0.95); background: #f9f9f9; }

        /* --- आपका पुराना कंटेंट यहाँ सुरक्षित है --- */
        #main-content { visibility: hidden; opacity: 0; transition: 1s; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 1. लॉगिन स्क्रीन (यह सबसे पहले दिखेगी) -->
    <div id="login-overlay">
        <div class="login-card">
            <img src="your-logo.png" style="width: 80px; margin-bottom: 15px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/190/190411.png'">
            <h2>ONLY HINDI IAS</h2>
            <p>जारी रखने के लिए लॉगिन करें</p>
            
            <button class="btn-google" onclick="googleSignIn()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Login with Google
            </button>

            <div id="loader" style="display:none; margin-top:20px; font-size:12px; color:#3b5098;">Verifying access...</div>
        </div>
        <p style="margin-top: 30px; font-size: 11px; color: #3b5098; font-weight: bold;">Security Powered by Firebase 🔒</p>
    </div>

    <!-- 2. आपका पुराना मुख्य कंटेंट (Login के बाद ही दिखेगा) -->
    <div id="main-content">
        <!-- यहाँ आपका पुराना सारा कोड (Index.html का बॉडी पार्ट) वैसा ही रहेगा -->
        <h1 style="text-align:center; margin-top:50px;">Redirecting to Batches...</h1>
    </div>

    <script>
        // --- HIGH-LEVEL SECURITY & FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCsa9eNrn5UDK4ShPFvDIxyd5cmWLuHsEQ",
            authDomain: "only-hindi-ias-64e90.firebaseapp.com",
            projectId: "only-hindi-ias-64e90",
            appId: "1:1039198714535:web:55d1c9365ac11ec08fb982"
        };
        
        firebase.initializeApp(firebaseConfig);

        function googleSignIn() {
            document.getElementById('loader').style.display = 'block';
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                // लॉगिन होने के बाद सीधा batches.html पर भेजें
                window.location.href = "batches.html";
            }).catch((error) => {
                document.getElementById('loader').style.display = 'none';
                alert("Login Error: " + error.message);
            });
        }

        // ऑटो-चेक: क्या छात्र पहले से लॉगिन है?
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // अगर लॉगिन है, तो सीधे batches पर भेजें
                window.location.href = "batches.html";
            }
        });

        // Anti-Copy & Security Logic
        document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) return false; };
        setInterval(function() { debugger; }, 100);
    </script>
</body>
</html>
