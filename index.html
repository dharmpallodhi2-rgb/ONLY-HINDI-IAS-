<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS - Neon Edition</title>
    <style>
        /* 🎨 Neon Purple & Dark थीम 🎨 */
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #2d0b3d, #050a1f 60%);
            background-attachment: fixed;
            color: white; 
            padding-bottom: 40px; 
            overflow-x: hidden; 
        }
        
        .header { 
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: #ffaa00; 
            padding: 20px; 
            border-bottom: 2px solid #8e2de2; 
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 0 25px rgba(142, 45, 226, 0.4); 
        }
        .header h1 { margin: 0; font-size: 18px; font-weight: 800; text-shadow: 0 0 10px #ffaa00; }
        .profile-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ffaa00; }

        .banner-box { margin: 25px 15px; border-radius: 20px; overflow: hidden; border: 1px solid #8e2de2; box-shadow: 0 0 20px rgba(142, 45, 226, 0.3); }
        .banner-box img { width: 100%; display: block; }

        .news-container { background: rgba(0, 0, 0, 0.6); padding: 12px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 25px; overflow: hidden; }
        .news-scroll { display: inline-block; white-space: nowrap; padding-left: 100%; animation: newsSlide 15s linear infinite; }
        .news-scroll span { font-size: 16px; font-weight: 800; color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        @keyframes newsSlide { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .card-grid { padding: 0 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .prof-button {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            overflow: hidden;
            display: block;
            border: 1px solid rgba(142, 45, 226, 0.2);
            backdrop-filter: blur(10px);
        }

        .prof-button::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #8e2de2);
            animation: rotate-border 4s linear infinite;
        }

        .prof-button::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0a1128;
            border-radius: 16px;
            z-index: 1;
        }

        .btn-content { position: relative; z-index: 2; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        .prof-button span { font-size: 30px; display: block; margin-bottom: 5px; filter: drop-shadow(0 0 8px #8e2de2); }
        .prof-button p { margin: 0; font-size: 13px; font-weight: bold; color: #ffaa00; text-transform: uppercase; }

        .section-title { padding: 25px 20px 10px; font-size: 12px; font-weight: bold; color: #8e2de2; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #8e2de2; }

        .gov-card { grid-column: span 2; display: flex; align-items: center; text-align: left; padding: 15px; margin-bottom: 10px; }
        .gov-card img { width: 75px; height: 75px; border-radius: 12px; margin-right: 15px; border: 1px solid #8e2de2; }

.btn-action { background: #ffaa00; color: #000; padding: 8px 18px; border-radius: 10px; font-size: 12px; font-weight: 900; display: inline-block; margin-top: 8px; box-shadow: 0 0 15px #ffaa00; text-decoration: none; }

        .more-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; }
        .more-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px 5px; text-align: center; border: 1px solid rgba(142, 45, 226, 0.2); }
        .more-card span { font-size: 20px; display: block; }
        .more-card p { margin: 0; font-size: 10px; font-weight: bold; color: #ddd; }

        .comm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 15px; }
        .comm-card { background: white; border-radius: 18px; padding: 15px; text-align: center; text-decoration: none; box-shadow: 0 0 15px rgba(142, 45, 226, 0.2); }
        .comm-card img { width: 35px; height: 35px; margin-bottom: 5px; }
        .comm-card p { margin: 0; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ONLY HINDI IAS</h1>
        <img src="1766115476203(2).jpg" class="profile-logo" alt="Logo">
    </div>

    </div>

    <div class="news-container">
        <div class="news-scroll">
            <span>𝐎𝐍𝐋𝐘 𝐇𝐈𝐍𝐃𝐈 𝐈𝐀𝐒 में आपका स्वागत है...&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
    </div>

    <div class="section-title">⚡ CORE MISSIONS</div>
    <div class="card-grid">
        <a href="batches.html" class="prof-button">
            <div class="btn-content"><span>🎓</span><p>KGS Batches</p></div>
        </a>
        <div class="prof-button"><div class="btn-content"><span>❤️</span><p>Favourites</p></div></div>
        <div class="prof-button"><div class="btn-content"><span>⌛</span><p>History</p></div></div>
        <div class="prof-button"><div class="btn-content"><span>⬇️</span><p>Downloads</p></div></div>

    <div class="section-title">🏛️ GOVERNANCE & HISTORY</div>
    <div class="card-grid">

            <div class="btn-content" style="display:flex; align-items:center;">
                <img src="IMG_20260319_163412_254.jpg" alt="Gov">
                <div>
                    <b style="font-size: 14px; color: #fff;">GOVERNANCE</b><br>
                    <a href="governance.pdf" target="_blank" class="btn-action">OPEN PDF</a>
                </div>
            </div>
        </div>

        <div class="prof-button gov-card">
            <div class="btn-content" style="display:flex; align-items:center;">

                <div>

                    <a href="history-notes.pdf" target="_blank" class="btn-action">OPEN PDF</a>

    </div>

    <div class="section-title">🛡️ SECONDARY TOOLS</div>
    <div class="more-grid">
        <div class="more-card"><span>🏅</span><p>Exams</p></div>
        <div class="more-card"><span>💡</span><p>Gyan Bindu</p></div>
        <a href="https://ncert.nic.in/" target="_blank" style="text-decoration:none;">
            <div class="more-card"><span>📖</span><p style="color:#00f2fe;">NCERT</p></div>
        </a>
    </div>

    <div class="section-title">🤝 NETWORKS</div>
    <div class="comm-grid">
        <a href="https://t.me/mission968" target="_blank" class="comm-card" style="border-bottom: 4px solid #0088cc;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
            <p style="color: #0088cc;">Telegram</p>

</a>
        <a href="https://wa.me/919685026772" target="_blank" class="comm-card" style="border-bottom: 4px solid #25d366;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            <p style="color: #25d366;">WhatsApp</p>
        </a>
    </div>

</body>
</html>
