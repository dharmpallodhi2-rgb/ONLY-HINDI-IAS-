<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>पर्यावरण भूगोल - ONLY HINDI IAS</title>
<style>
:root{--primary:#3b5098;--accent:#ffaa00;--bg:#fcf9f2;--white:#ffffff;--text:#111}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;background-color:var(--bg);font-family:Arial,sans-serif;user-select:none;-webkit-user-select:none}

/* Header Section */
.header{background:var(--primary);padding:15px;display:flex;align-items:center;color:white;position:sticky;top:0;z-index:1000;border-bottom-left-radius:15px;border-bottom-right-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.back-btn{background:var(--accent);width:35px;height:35px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;margin-right:15px;color:white;text-decoration:none;font-size:18px}

/* In-Built Web Player */
#player-wrapper { display:none; background:#000; position:sticky; top:65px; z-index:999; width:100%; aspect-ratio:16/9; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
#video-frame { width:100%; height:100%; border:none; }

/* Lecture Grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px}
.card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.06);cursor:pointer;border:1px solid #f0f0f0;display:flex;flex-direction:column;transition:0.2s}
.card:active{transform:scale(0.97)}
.thumb-box{position:relative;width:100%;aspect-ratio:16/9;background:#eee}
.thumb{width:100%;height:100%;object-fit:cover;border-bottom:2px solid var(--accent)}
.info{padding:12px;display:flex;flex-direction:column;justify-content:space-between;flex-grow:1}
.badge{color:#c62828;font-size:9px;font-weight:800;padding:4px 6px;border-radius:4px;background:#ffebee;display:inline-flex;align-items:center;margin-bottom:8px;width:fit-content;text-transform:uppercase}
.title{font-size:12px;font-weight:bold;color:var(--text);line-height:1.4;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.date-pill{background:#f3f4f6;color:#6b7280;font-size:10px;font-weight:700;padding:6px 10px;border-radius:20px;display:flex;align-items:center;width:100%}

@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<header class="header">
<a href="geooptional.html" class="back-btn">⬅</a>
<div style="flex-grow:1">
<b style="font-size:16px;display:block">पर्यावरण भूगोल (Environment)</b>
<span style="font-size:11px;color:var(--accent)">Full Video Series • Sachin Arora Sir</span>
</div>
</header>

<div id="player-wrapper">
    <iframe id="video-frame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<main class="grid" id="lecture-list"></main>

<script>
/* --- SECURITY --- */
document.onkeydown=function(e){if(e.keyCode==123||(e.ctrlKey&&e.shiftKey))return false};

/* --- ENVIRONMENT LECTURE DATA --- */
const envData = [
    { title: "Environment - Lec 01", id: "F18-aeDMido" },
    { title: "Environment - Lec 02", id: "vwJPCFc04ao" },
    { title: "Environment - Lec 03", id: "vOscypkuIVk" },
    { title: "Environment - Lec 04", id: "aIL9vQFP66U" },
    { title: "Environment - Lec 05", id: "EbtjihUJqEM" },
    { title: "Environment - Lec 06", id: "q6ua-NullVg" },
    { title: "Environment - Lec 07", id: "6yAvmljHW9E" },
    { title: "Environment - Lec 08", id: "C8BznELBJlw" },
    { title: "Environment - Lec 09", id: "X_SdHUWOpw8" },
    { title: "Environment - Lec 10", id: "0CHIXo55UCo" },
    { title: "Environment - Lec 11", id: "Mci_XIgQi8s" },
    { title: "Environment - Lec 12", id: "OEqOFN9FAhs" },
    { title: "Environment - Lec 13", id: "gKTeHrtAErw" },
    { title: "Environment - Lec 14", id: "a6GMYOsUzxg" }
];

const listContainer = document.getElementById('lecture-list');
const playerWrapper = document.getElementById('player-wrapper');
const videoFrame = document.getElementById('video-frame');

envData.forEach(function(item) {
    const card = document.createElement('div');
    card.className = 'card';
    
    // Website Player Logic
    card.onclick = () => { 
        playerWrapper.style.display = 'block';
        videoFrame.src = "https://www.youtube.com/embed/" + item.id + "?autoplay=1&rel=0";
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    card.innerHTML = `
        <div class="thumb-box">
            <img src="https://i.ytimg.com/vi/${item.id}/hqdefault.jpg" class="thumb" loading="lazy">
        </div>
        <div class="info">
            <div>
                <span class="badge">▶ PLAY ON WEBSITE</span>
                <div class="title">${item.title}</div>
            </div>
            <div class="date-pill">🕒 Recorded Lecture • Sachin Sir</div>
        </div>`;
    
    listContainer.appendChild(card);
});
</script>
</body>
</html>
