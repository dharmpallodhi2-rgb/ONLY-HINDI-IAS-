<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Only Hindi IAS Player</title>
    
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #ffaa00; --bg: #ffffff; --text: #000000; --panel-bg: #f8f9fa; --border: #e0e0e0; }
        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text); -webkit-user-select: none; user-select: none; }
        
        /* हेडर (Top Controls) */
        .player-header { padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); background-color: var(--bg); position: sticky; top: 0; z-index: 100; }
        .back-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; text-decoration: none; color: var(--text); }
        
        /* वीडियो एरिया */
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { max-width: 100%; max-height: 100%; }

        /* कंट्रोल पैनल (KGS Style, White Theme) */
        .control-panel { padding: 15px; background-color: var(--panel-bg); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
        .info-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .title { font-size: 14px; font-weight: bold; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .full-screen-btn { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }

        .control-group { margin-bottom: 15px; }
        .control-label { font-size: 11px; color: #5f6368; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .btn-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .btn-list button { background-color: white; border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; }
        .btn-list button:hover { border-color: #333; background-color: #f1f1f1; }
        .btn-list button.active { background-color: var(--primary); color: white; border-color: var(--primary); }

    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="player-header">
        <a href="javascript:history.back()" class="back-btn">
            <span>&#11013;</span> BACK
        </a>
    </div>

    <div class="video-wrapper">
        <video id="video" autoplay playsinline crossorigin="anonymous"></video>
    </div>

    <div class="control-panel">
        <div class="info-header">
            <div class="title" id="lectureTitle">Video Loading...</div>
            <button class="full-screen-btn" onclick="toggleFullScreen()">FULL SCREEN</button>
        </div>

        
<div class="control-group">
            <span class="control-label">SPEED</span>
            <div class="btn-list" id="speedList">
                <button value="0.5">0.5x</button>
                <button value="1" class="active">1x</button>
                <button value="1.5">1.5x</button>
                <button value="2">2x</button>
            </div>
        </div>

        
<div class="control-group">
            <span class="control-label">QUALITY</span>
            <div class="btn-list" id="qualityList">
                <button value="-1" class="active">Auto</button>
            </div>
        </div>
    </div>

    <script>
        // --- MASTER SECURITY ---
        setInterval(() => { let b = Date.now(); debugger; if (Date.now() - b > 100) window.location.reload(); }, 100);
        document.onkeydown = (e) => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const video = document.getElementById('video');
        const lectureTitle = document.getElementById('lectureTitle');
        const qualityList = document.getElementById('qualityList');
        const speedList = document.getElementById('speedList');

        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');

        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                lectureTitle.innerText = "Enjoy Your ONLY HINDI IAS Lecture";
                // Populate Quality Menus
                hls.levels.forEach((level, index) => {
                    const btn = document.createElement('button');
                    btn.value = index;
                    btn.textContent = level.height + "p";
                    btn.onclick = () => {
                        hls.currentLevel = index;
                        setActiveButton(qualityList, btn);
                    };
                    qualityList.appendChild(btn);
                });
            });
            qualityList.querySelector('button[value="-1"]').onclick = () => {
                hls.currentLevel = -1; // Auto
                setActiveButton(qualityList, qualityList.querySelector('button[value="-1"]'));
            };
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }

        // --- SPEEDS HANDLING ---
        Array.from(speedList.getElementsByTagName('button')).forEach(btn => {
            btn.onclick = () => {
                video.playbackRate = parseFloat(btn.value);
                setActiveButton(speedList, btn);
            };
        });

        // --- HELPERS ---
        const setActiveButton = (list, activeButton) => {
            Array.from(list.getElementsByTagName('button')).forEach(b => b.classList.remove('active'));
            activeButton.classList.add('active');
        };

        const toggleFullScreen = () => {
            if (document.fullscreenElement) { document.exitFullscreen(); }
            else { video.requestFullscreen(); }
        };
    </script>
</body>
</html>
