<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHI Video Player - ONLY HINDI IAS</title>
    <!-- Video.js CSS for HLS support -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; font-family: sans-serif; overflow: hidden; user-select: none; }
        .player-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
        .back-btn { position: absolute; top: 20px; left: 20px; z-index: 9999; background: rgba(255, 170, 0, 0.8); color: white; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 14px; }
        iframe { width: 100vw; height: 100vh; border: none; }
        #error-msg { color: white; text-align: center; display: none; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false">

    <a href="javascript:history.back()" class="back-btn">⬅ वापस जाएं</a>

    <div class="player-container" id="container">
        <!-- Video elements will be injected here -->
        <div id="error-msg">वीडियो लोड करने में समस्या हो रही है। कृपया लिंक जांचें।</div>
    </div>

    <!-- Video.js JS -->
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <script>
        /**
         * SECURITY: Anti-Copy & DevTools Blocking
         */
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        setInterval(() => { debugger; }, 50);

        /**
         * URL Handling & Player Injection
         */
        const urlParams = new URLSearchParams(window.location.search);
        let videoUrl = urlParams.get('url');

        if (videoUrl) {
            videoUrl = decodeURIComponent(videoUrl);
            const container = document.getElementById('container');

            if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
                // Handle YouTube
                let embedUrl = videoUrl.replace("watch?v=", "embed/").replace("youtu.be/", "youtube.com/embed/");
                container.innerHTML = `<iframe src="${embedUrl}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } 
            else if (videoUrl.endsWith('.m3u8') || videoUrl.includes('.m3u8')) {
                // Handle HLS (.m3u8) using Video.js
                container.innerHTML = `
                    <video id="ohi-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto">
                        <source src="${videoUrl}" type="application/x-mpegURL">
                    </video>`;
                
                videojs('ohi-player', {
                    fluid: true,
                    playbackRates: [0.5, 1, 1.5, 2]
                });
            }
            else {
                // Default fallback for normal MP4 or direct links
                container.innerHTML = `<video src="${videoUrl}" controls autoplay style="width:100%; height:100%;"></video>`;
            }
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
