<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS | Pro Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #d93838; --white: #ffffff; --black: #000000; --gray: #f1f3f4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--white); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        .top-nav { background: var(--white); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; z-index: 1000; }
        .back-btn { background: var(--primary); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; margin-right: 12px; font-size: 13px; }
        .brand { font-weight: bold; font-size: 14px; color: var(--black); }

        /* VIDEO CONTAINER & FULLSCREEN FIX */
        .video-box { position: relative; width: 100%; background: #000; flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 100%; display: block; }

        /* PSEUDO FULLSCREEN CLASS */
        .pseudo-fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; background: #000 !important; }

        /* CONTROL PANEL */
        .panel { background: var(--white); padding: 20px; border-top: 2px solid var(--primary); overflow-y: auto; }
        .label { font-size: 11px; color: #5f6368; font-weight: bold; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .btn { background: var(--gray); border: 1px solid #dadce0; color: #3c4043; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .fs-toggle { background: #3c4043; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-btn">BACK</a>
        <div class="brand">ONLY HINDI IAS PLAYER</div>
    </div>

    <div class="video-box" id="vidWrapper">
        <video id="videoPlayer" controls autoplay playsinline crossorigin="anonymous"></video>
    </div>

    <div class="panel">
        <span class="label">Playback Speed</span>
        <div class="btn-group" id="speedGroup">
            <div class="btn" data-v="0.5">0.5x</div>
            <div class="btn active" data-v="1">Normal</div>
            <div class="btn" data-v="1.5">1.5x</div>
            <div class="btn" data-v="2">2x</div>
        </div>

        <span class="label">Video Quality</span>
        <div class="btn-group" id="qualityGroup">
            <div class="btn active" id="autoBtn">Auto</div>
        </div>

        <button class="fs-toggle" id="fsBtn">⛶ Fullscreen</button>
    </div>

    <script>
        // Security Lock
        setInterval(() => { debugger; }, 500);

        const video = document.getElementById('videoPlayer');
        const wrapper = document.getElementById('vidWrapper');
        const fsBtn = document.getElementById('fsBtn');
        const urlParams = new URLSearchParams(window.location.search);
        const m3u8Url = urlParams.get('url');

        // HLS Logic
        if (Hls.isSupported() && m3u8Url) {
            const hls = new Hls();
            hls.loadSource(m3u8Url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                hls.levels.forEach((lvl, i) => {
                    const b = document.createElement('div');
                    b.className = 'btn';
                    b.innerText = lvl.height + 'p';
                    b.onclick = () => { hls.currentLevel = i; uiActive('qualityGroup', b); };
                    document.getElementById('qualityGroup').appendChild(b);
                });
            });
            document.getElementById('autoBtn').onclick = () => { hls.currentLevel = -1; uiActive('qualityGroup', document.getElementById('autoBtn')); };
        }

        // SMART FULLSCREEN LOGIC
        fsBtn.onclick = () => {
            if (video.requestFullscreen) { video.requestFullscreen(); }
            else if (video.webkitEnterFullscreen) { video.webkitEnterFullscreen(); } // iOS Fix
            else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); }
            else {
                // Pseudo Fullscreen Fallback
                wrapper.classList.toggle('pseudo-fullscreen');
            }
        };

        // Speed Control
        document.querySelectorAll('#speedGroup .btn').forEach(b => {
            b.onclick = () => { video.playbackRate = parseFloat(b.dataset.v); uiActive('speedGroup', b); };
        });

        function uiActive(id, btn) {
            document.getElementById(id).querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
