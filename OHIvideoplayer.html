<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONLY HINDI IAS | Advanced Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --red: #d93838; --white: #ffffff; --dark: #0f172a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--white); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header Area */
        .header { background: var(--white); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; z-index: 10; }
        .back-btn { background: var(--red); color: white; border: none; padding: 6px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; margin-right: 15px; }

        /* Video Container */
        .video-box { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 100%; outline: none; }

        /* Fullscreen Controls Overlay */
        .video-ui { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 10px; color: white; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .video-ui * { pointer-events: auto; }

        /* Bottom Settings Panel */
        .settings-panel { background: var(--white); padding: 20px; border-top: 3px solid var(--red); }
        .label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { border: 1px solid #ccc; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; background: white; color: #333; transition: 0.2s; }
        .btn.active { background: var(--red); color: white; border-color: var(--red); }

        .full-btn-big { background: var(--dark); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <button onclick="history.back()" class="back-btn">BACK</button>
        <span style="font-weight: bold; color: #1e293b;">ONLY HINDI IAS PRO</span>
    </div>

    <div class="video-box" id="container">
        <video id="video" playsinline crossorigin="anonymous" controls></video>
    </div>

    <div class="settings-panel">
        <span class="label">Playback Speed</span>
        <div class="btn-row" id="speedGroup">
            <button class="btn" onclick="setSpeed(0.5, this)">0.5x</button>
            <button class="btn active" onclick="setSpeed(1, this)">Normal</button>
            <button class="btn" onclick="setSpeed(1.5, this)">1.5x</button>
            <button class="btn" onclick="setSpeed(2, this)">2x</button>
        </div>

        <span class="label">Video Quality</span>
        <div class="btn-row" id="qualityGroup">
            <button class="btn active" id="autoBtn">Auto</button>
        </div>

        <button class="full-btn-big" onclick="goFull()">
            <span class="material-icons">fullscreen</span> ENABLE FULLSCREEN
        </button>
    </div>

    <script>
        // Security logic
        setInterval(() => { debugger; }, 100);

        const video = document.getElementById('video');
        const container = document.getElementById('container');
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');

        // Initializing Video
        if (Hls.isSupported() && videoUrl) {
            const hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                hls.levels.forEach((lvl, i) => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = lvl.height + 'p';
                    b.onclick = () => { hls.currentLevel = i; updateActive('qualityGroup', b); };
                    document.getElementById('qualityGroup').appendChild(b);
                });
            });
            document.getElementById('autoBtn').onclick = function() { hls.currentLevel = -1; updateActive('qualityGroup', this); };
        } else {
            video.src = videoUrl;
        }

        // Fullscreen Logic for all devices
        function goFull() {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen(); // Safari/iOS
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen(); // Old iPhone
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen(); // IE11
            } else {
                alert("This device doesn't support fullscreen API, using browser default.");
            }
        }

        function setSpeed(s, b) {
            video.playbackRate = s;
            updateActive('speedGroup', b);
        }

        function updateActive(id, activeBtn) {
            const btns = document.getElementById(id).querySelectorAll('.btn');
            btns.forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }
    </script>
</body>
</html>
