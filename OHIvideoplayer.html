<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional ONLY HINDI IAS Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .player-wrapper { position: relative; width: 100%; max-width: 800px; margin: auto; }
        video { width: 100%; display: block; }
        
        /* कंट्रोल पैनल */
        .controls { background: #1a1a1a; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        select, button { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; cursor: pointer; }
        .back-btn { background: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <video id="video" controls playsinline></video>
        
        <div class="controls">
            <button class="back-btn" onclick="history.back()">⬅ वापसी</button>
            
            <div>
                <label>क्वालिटी:</label>
                <select id="qualitySel"><option value="-1">Auto</option></select>
            </div>

            <div>
                <label>स्पीड:</label>
                <select id="speedSel" onchange="document.getElementById('video').playbackRate = this.value">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySel = document.getElementById('qualitySel');
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');

        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                hls.levels.forEach((level, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.textContent = level.height + "p";
                    qualitySel.appendChild(opt);
                });
            });
            qualitySel.onchange = () => hls.currentLevel = parseInt(qualitySel.value);
        } else {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
