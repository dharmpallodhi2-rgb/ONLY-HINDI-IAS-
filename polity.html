<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Polity - ONLY HINDI IAS</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f6f9; font-family: Arial, sans-serif; user-select: none; -webkit-user-select: none; }
        .header { background-color: #3b5098; padding: 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 100; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-circle { background-color: #ffaa00; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 15px; font-weight: bold; color: white; text-decoration: none; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.06); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: transform 0.2s; position: relative; }
        .card:active { transform: scale(0.96); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #ddd; border-bottom: 3px solid #ffaa00; }
        .info { padding: 8px; flex-grow: 1; }
        .badge { color: #d93838; font-size: 8px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 5px; text-transform: uppercase; }
        .title { font-size: 10px; font-weight: bold; color: #222; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .play-icon { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 170, 0, 0.9); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <!-- Header Section -->
    <div class="header">
        <a href="batches.html" class="back-circle">⬅</a>
        <div style="flex-grow: 1;">
            <b style="font-size: 14px; display: block;">Indian Polity (राजव्यवस्था)</b>
            <span style="font-size: 10px; color: #ffaa00; font-weight: 500;">By Rajesh Mishra Sir</span>
        </div>
    </div>

    <!-- Lectures Grid -->
    <div class="grid" id="polity-list">
        <!-- JS के द्वारा लेक्चर्स यहाँ लोड होंगे -->
    </div>

    <script>
        // --- MASTER SECURITY PROTOCOL ---
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        setInterval(function() { debugger; }, 100);

        // --- DATA DECODING & RENDERING ---
        const d = (s) => atob(s); // Base64 Decoding Function

        // पॉलिटी के 55 लेक्चर्स का डेटा
        const lectures = [
            { t: "L 55 || भारतीय राजव्यवस्था - Last Class", u: "aHR0cHM6Ly9rZ3MtdjEuYWthbWFpemVkLm5ldC9rdjMvb2N0LTIwMjUvNDAyMDE5L2tnc3MtMTc2NDE1Mjk0Mi12NDAyMDE5Lm0zdTg=", i: "7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5" },
            { t: "L 54 || भारतीय राजव्यवस्था - Part 54", u: "aHR0cHM6Ly9rZ3MtdjEuYWthbWFpemVkLm5ldC9rdjMvb2N0LTIwMjUvNDAxMDc2L2tnc3MtMTc2NDA2NjQ0Mi12NDAxMDc2Lm0zdTg=", i: "7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5" },
            // नील भाई, इसी तरह आपके पास जो 55 लेक्चर्स की लिस्ट है वो यहाँ आ जाएगी
            // उदाहरण के लिए L01 दिखा रहा हूँ:
            { t: "L 01 || प्रस्तावना (Preamble) - 01", u: "aHR0cHM6Ly9rZ3MtdjEuYWthbWFpemVkLm5ldC9rdjMvc2VwLTIwMjUvMzM4MjI3L2tnc3MtMTc1Njg5MjgxOC12MzMzMjI3Lm0zdTg=", i: "7Jug6dz5vcbyvY1dcFUego3Bsyh2E1Hwr38J15h5" }
        ];

        const list = document.getElementById('polity-list');
        
        lectures.forEach(l => {
            // हम अब वीडियो को अपने नए 'vplayer.html' इंजन में खोल रहे हैं
            const vPlayerUrl = `vplayer.html?url=${d(l.u)}`;
            
            list.innerHTML += `
                <div class="card" onclick="window.location.href='${vPlayerUrl}'">
                    <div class="play-icon">▶</div>
                    <img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/${l.i}.jpg" class="thumb" onerror="this.src='https://via.placeholder.com/400x225?text=Indian+Polity'">
                    <div class="info">
                        <span class="badge">POLITY CLASS</span>
                        <div class="title">${l.t}</div>
                    </div>
                </div>`;
        });

        // Anti-Copy Logic
        document.addEventListener('copy', (e) => e.preventDefault());
    </script>
</body>
</html>
