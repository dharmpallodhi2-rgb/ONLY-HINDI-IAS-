<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Management - ONLY HINDI IAS</title>
    <style>
        :root { --primary-blue: #3b5098; --accent-yellow: #ffaa00; --bg-gray: #f5f6f9; }
        body { margin: 0; padding: 0; background-color: var(--bg-gray); font-family: 'Segoe UI', Arial, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { background-color: var(--primary-blue); padding: 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-circle { background-color: var(--accent-yellow); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 15px; font-weight: bold; color: white; text-decoration: none; transition: transform 0.2s; }
        .back-circle:active { transform: scale(0.9); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.06); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:active { transform: scale(0.96); }
        .thumb-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #ddd; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .badge { color: #d93838; font-size: 9px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 6px; }
        .title { font-size: 11px; font-weight: bold; color: #222; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <header class="header">
        <a href="batches.html" class="back-circle">⬅</a>
        <div>
            <b style="font-size: 15px; display: block;">Disaster Management</b>
            <span style="font-size: 11px; color: var(--accent-yellow);">By Shankar Jha Sir</span>
        </div>
    </header>

    <main class="grid" id="dm-list"></main>

    <script>
        /**
         * SECURITY PROTOCOL
         * DevTools Blocking & Anti-Copy
         */
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        // Anti-Debugging freeze
        (function() {
            setInterval(function() { debugger; }, 50);
        })();

        /**
         * LECTURE DATA
         * URL Masking is applied during click
         */
        const lectures = [
            { t: "Lecture 09 || जैविक आपदा / महामारी", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/456372/kgss-1768962270-v456372.m3u8", i: "VclMiQzgg1FsPcY4NEPojSQIZpiWFpBkpIqgysbB" },
            { t: "Lecture 08 || नगरीय बाढ़", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/455126/kgss-1768876000-v455126.m3u8", i: "zet07diTlgLTOcLap6UIveSkSrne1e00k9KLmIzT" },
            { t: "Lecture 07 || बादल फटना", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/454503/kgss-1768789595-v454503.m3u8", i: "GXcuk91SzvNLK5qkuuIxjfyRNnwLOLmcFS0I1zJk" },
            { t: "Lecture 06 || सूखा आपदा प्रबंधन", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/454439/kgss-1768703272-v454439.m3u8", i: "KpBDg3qvcBhIX78hHIekm2bMVsBPfKILISEZr80q" },
            { t: "Lecture 05 || सुनामी आपदा प्रबंधन", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/452825/kgss-1768616929-v452825.m3u8", i: "FXwVKUqHcx0Ejwsi6rcg8XumQw6R8lYRvrfz6Ve7" },
            { t: "Lecture 04 || भूकंप आपदा प्रबंधन", u: "https://www.youtube.com/embed/22F01R2xDdA", i: "LhSwr4BwJsSO7vZ89CngBt7qIrNB9YaZ4GxNZCIF" },
            { t: "Lecture 03 || भारत में आपदा प्रबंधन", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/450587/kgss-1768445664-v450587.m3u8", i: "IQJEIwSmEscLjkoc2gGv65XfFJYuygp5S2tGHRtD" },
            { t: "Lecture 02 || आपदा प्रबंधन के चरण", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/449087/kgss-1768359798-v449087.m3u8", i: "TPANXvYReTar01aCJhuWFb5847nciezwvIhaFir2" },
            { t: "Lecture 01 || आपदा प्रबंधन", u: "https://kgs-v1.akamaized.net/kv3/jan-2026/447880/kgss-1768272450-v447880.m3u8", i: "TPANXvYReTar01aCJhuWFb5847nciezwvIhaFir2" }
        ];

        const list = document.getElementById('dm-list');
        
        lectures.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Link Masking & OHI Video Player Integration
            card.onclick = () => {
                const videoUrl = encodeURIComponent(l.u);
                window.location.href = `OHIvideoplayer.html?url=${videoUrl}`;
            };

            card.innerHTML = `
                <div class="thumb-box">
                    <img src="https://kgs-v2.akamaized.net/kgs/kgs/video-thumbs/thumb/uploads/${l.i}.jpg" class="thumb" loading="lazy">
                </div>
                <div class="info">
                    <span class="badge">▶ CLASS VIDEO</span>
                    <div class="title">${l.t}</div>
                </div>`;
            
            list.appendChild(card);
        });
    </script>
</body>
</html>
