<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Compulsory - ONLY HINDI IAS</title>
    <style>
        :root { --primary-blue: #3b5098; --accent-yellow: #ffaa00; --bg-gray: #f5f6f9; }
        body { margin: 0; padding: 0; background-color: var(--bg-gray); font-family: 'Segoe UI', Arial, sans-serif; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER */
        .header { background-color: var(--primary-blue); padding: 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-circle { background-color: var(--accent-yellow); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 15px; font-weight: bold; color: white; text-decoration: none; font-size: 18px; transition: transform 0.2s; }
        .back-circle:active { transform: scale(0.9); }
        
        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.06); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: transform 0.2s; position: relative; }
        .card:active { transform: scale(0.96); }
        .thumb-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #ddd; border-bottom: 3px solid var(--accent-yellow); }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .badge { color: #d93838; font-size: 9px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 5px; text-transform: uppercase; }
        .title { font-size: 11px; font-weight: bold; color: #222; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <header class="header">
        <a href="batches.html" class="back-circle">⬅</a>
        <div style="flex-grow: 1;">
            <b style="font-size: 16px; display: block;">Hindi Compulsory</b>
            <span style="font-size: 11px; color: var(--accent-yellow); font-weight: 500;">By Dr. Ajay Anurag Sir</span>
        </div>
    </header>

    <main class="grid" id="hindi-list"></main>

    <script>
        /** 
         * SECURITY PROTOCOL
         */
        document.onkeydown = (e) => {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
        setInterval(() => { debugger; }, 50);

        // Base64 Decoding Function
        const d = (s) => atob(s);

        /**
         * LECTURE DATA (ENCODED LINKS)
         */
        const lectures = [
            { t: "Lecture 06 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzL21hci0yMDI1LzIxMTE0MC9rZ3NzLTE3NDE2NzA1NjQtdjIxMTE0MC5tM3U4", i: "Qw5ZQdL4rzT3lv4lTn2zSOuFSy6sp0EHIeZvOBJT" },
            { t: "Lecture 05 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzL21hci0yMDI1LzIxMDgwNC9rZ3NzLTE3NDE1ODQxOTUtdjIxMDgwNC5tM3U4", i: "islsH9ZKJRsoW2FoyQOu4px4r7eSsVuEaZrC4lXk" },
            { t: "Lecture 04 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzLXVwc2MlMkZ1cHNjLWVuZy1iYXRjaC0wNCUyRmhpbmRpLWNvbS1hYmF5LWFudXJhZy1zaXIlMkZoaW5kaS1lbmc0Lm0zdTg=", i: "TCwyuUVeCPzAm15b2vfwCUuvIMMMC5yZLhfEsYgn" },
            { t: "Lecture 03 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzL21hci0yMDI1LzIwODA5OS9rZ3NzLTE3NDEzMjUwNDctdjIwODA5OS5tM3U4", i: "hjhHobpA9kucUPo7rkgobwqaRuW8JQmXm5tdkSdZ" },
            { t: "Lecture 02 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzL21hci0yMDI1LzIwNjY4Ni9rZ3NzLTE3NDEyMzg0ODYtdjIwNjY4Ni5tM3U4", i: "8EUisIYAQWQeE5AeYAzEqx7yEJAyYkRZJpQ3Yw5f" },
            { t: "Lecture 01 || Hindi Compulsory", u: "aHR0cHM6Ly9rZ3MtdmEubmEuc3ByZWUuaW8va3YzL21hci0yMDI1LzIwNjU4MS9rZ3NzLTE3NDExNTIyNjktdjIwNjU4MS5tM3U4", i: "4uf7ydQqazA39yFeao6NO6mcFQotLIFW02IVgmCH" }
        ];

        const list = document.getElementById('hindi-list');
        
        lectures.forEach(l => {
            const card = document.createElement('div');
            card.className = 'card';
            
            card.onclick = () => {
                // Decoding URL and passing it to OHIvideoplayer.html
                const decodedUrl = d(l.u);
                window.location.href = `OHIvideoplayer.html?url=${encodeURIComponent(decodedUrl)}`;
            };

            card.innerHTML = `
                <div class="thumb-box">
                    <img src="https://kgs-v2.akamaized.net/kgs/kgs-do/video-thumbs/${l.i}.jpg" class="thumb" onerror="this.src='https://via.placeholder.com/400x225?text=Hindi+Compulsory'" loading="lazy">
                </div>
                <div class="info">
                    <span class="badge">WATCH LECTURE</span>
                    <div class="title">${l.t}</div>
                </div>`;
            
            list.appendChild(card);
        });
    </script>
</body>
</html>
