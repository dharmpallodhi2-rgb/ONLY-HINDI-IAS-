<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polity NCERT - ONLY HINDI IAS</title>
    <style>
        :root { --primary: #0a192f; --accent: #ff9800; --text: #ffffff; --card-bg: #112240; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--primary); color: var(--text); user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Header */
        .header { background: linear-gradient(90deg, #1a2a6c, #b21f1f, #fdbb2d); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header h1 { font-size: 1.3rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* Secured Player */
        #player-container { display: none; width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 60px; z-index: 999; border-bottom: 2px solid var(--accent); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Grid System */
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; position: relative; }
        .card:active { transform: scale(0.96); }
        
        .thumb-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,152,0,0.9); color: #fff; padding: 10px 15px; border-radius: 50%; font-size: 20px; }
        
        .info { padding: 12px; }
        .title { font-size: 0.95rem; font-weight: 600; color: #ccd6f6; line-height: 1.4; }
        .badge { display: inline-block; margin-top: 8px; font-size: 0.7rem; background: rgba(0,255,0,0.1); color: #00ff00; padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(0,255,0,0.2); }

        /* Loading Animation */
        #loader { text-align: center; margin-top: 100px; color: var(--accent); font-size: 1.2rem; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body oncontextmenu="return false">

    <header class="header">
        <h1>Polity Live Batch - ID 406</h1>
    </header>

    <div id="player-container">
        <iframe id="video-iframe" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div id="loader">सनी के सर्वर से डेटा आ रहा है...</div>
    <div class="container" id="lecture-list"></div>

    <script>
    /* 1. HIGH-LEVEL SECURITY PROTOCOL */
    (function secure() {
        // Disable DevTools & Inspection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67, 85].includes(e.keyCode))) return false;
        };
        // Infinite Debugger Loop to freeze console
        setInterval(() => { debugger; }, 500);
    })();

    /* 2. AUTOMATED DATA FETCHING ENGINE */
    async function syncBatchData() {
        const list = document.getElementById('lecture-list');
        const loader = document.getElementById('loader');
        const player = document.getElementById('player-container');
        const iframe = document.getElementById('video-iframe');

        // सनी की मास्टर API (Batch ID: 406)
        const targetUrl = "https://kgs-web.vercel.app/api/classroom/406";
        
        // सुरक्षा बाईपास करने के लिए प्रॉक्सी का उपयोग
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Connection Error");

            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents); // प्रॉक्सी डेटा को असली JSON में बदलना

            loader.style.display = 'none';
            list.innerHTML = '';

            // लेक्चर्स को वेबसाइट पर सजाना
            data.topics.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    player.style.display = 'block';
                    iframe.src = item.video_url; // सीधा सनी का वीडियो आपके प्लेयर में
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };

                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="${item.thumbnail}" class="thumb">
                        <div class="play-btn">▶</div>
                    </div>
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="badge">SECURED SERVER SYNC</div>
                    </div>
                `;
                list.appendChild(card);
            });

        } catch (err) {
            console.error(err);
            loader.innerHTML = "सनी ने रास्ता ब्लॉक कर दिया है! <br><br> Eruda खोलकर <b>X-Sunny-Req</b> चाबी चेक करें।";
            loader.style.color = "red";
        }
    }

    // पेज लोड होते ही जासूसी शुरू करें
    window.onload = syncBatchData;
    </script>
</body>
</html>
