<script>
/* 1. मास्टर सुरक्षा प्रोटोकॉल (Copy/DevTools Block) */
const lockSecurity = () => {
    setInterval(() => { debugger; }, 100);
    document.onkeydown = (e) => {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) return false;
    };
};
lockSecurity();

/* 2. LIVE DATA FETCHING LOGIC */
async function loadLiveLectures() {
    const listContainer = document.getElementById('lecture-list');
    const playerContainer = document.getElementById('player-container');
    const videoIframe = document.getElementById('video-iframe');

    // सनी की वेबसाइट से डेटा खींचने का लिंक (Batch ID: 406)
    const apiLink = "https://kgs-web.vercel.app/api/classroom/406";

    try {
        const response = await fetch(apiLink, {
            method: 'GET',
            headers: {
                'X-Sunny-Req': 'sunny', // आपकी जादुई चाबी
                'Accept': 'application/json'
            }
        });

        if (!response.ok) throw new Error("Blocked");
        const data = await response.json();
        
        // पुरानी लिस्ट साफ करके नया लाइव डेटा भरना
        listContainer.innerHTML = '';
        
        // डेटा को सजाना (Loop)
        data.topics.forEach(video => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                playerContainer.style.display = 'block';
                videoIframe.src = video.video_url; // आपके प्लेयर में सनी का वीडियो
                window.scrollTo({top:0, behavior:'smooth'});
            };
            card.innerHTML = `
                <div class="thumb-box">
                    <img src="${video.thumbnail}" class="thumb" loading="lazy">
                    <div class="play-icon">▶</div>
                </div>
                <div class="info">
                    <div class="title">${video.title}</div>
                    <div class="status">● LIVE: SYNCED FROM SERVER</div>
                </div>`;
            listContainer.appendChild(card);
        });

    } catch (error) {
        console.log("CORS या Security Error!");
        // अगर सनी ब्लॉक करे, तो यहाँ आप अपना पुराना 'Manual' डेटा दिखा सकते हैं
    }
}

window.onload = loadLiveLectures;
</script>
