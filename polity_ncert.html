  <script>
  (function() {
    "use strict";

    const M = {
        keysPath: "/api/sunny-keys",
        ajaxHeader: "X-Sunny-Req",
        ajaxValue: "sunny",
        defaultTtlMs: 8000,
        cacheSkewMs: 250,
        seedRetryDelayMs: 120,
        apiRetryDelayMs: 80,
    };

    const keySeedCache = new Map();

    function apiPath(input) {
        const raw = typeof input === "string" ? input : (input && input.url) || "";
        if (!raw) return "";
        const parsed = new URL(raw, window.location.origin);
        return parsed.pathname || "";
    }

    async function seedApiCookies(path, method) {
        const key = `${method}:${path}`;
        const now = Date.now();
        const cached = keySeedCache.get(key);
        if (cached && cached.expireAt > now + M.cacheSkewMs) {
            return;
        }

        const query = new URLSearchParams({ path, method }).toString();
        let res = await fetch(`${M.keysPath}?${query}`, {
            method: "GET",
            credentials: "same-origin",
            headers: { [M.ajaxHeader]: M.ajaxValue },
            cache: "no-store",
        });
        
        if (!res.ok && res.status === 403) {
            await new Promise((resolve) => setTimeout(resolve, M.seedRetryDelayMs));
            res = await fetch(`${M.keysPath}?${query}`, {
                method: "GET",
                credentials: "same-origin",
                headers: { [M.ajaxHeader]: M.ajaxValue },
                cache: "no-store",
            });
        }
        
        if (!res.ok) throw new Error("seed_failed");

        let ttlMs = M.defaultTtlMs;
        try {
            const payload = await res.json();
            const ttlSeconds = Number((payload && payload.t) || 0);
            if (Number.isFinite(ttlSeconds) && ttlSeconds > 0) {
                ttlMs = ttlSeconds * 1000;
            }
        } catch (_err) {
            ttlMs = M.defaultTtlMs;
        }
        keySeedCache.set(key, { expireAt: now + ttlMs });
    }

    async function sFetch(input, init) {
        const options = init ? {...init } : {};
        const method = (options.method || "GET").toUpperCase();
        const path = apiPath(input);
        if (!path || !path.startsWith("/api/")) {
            throw new Error("api_path_required");
        }

        await seedApiCookies(path, method);
        const headers = new Headers(options.headers || {});
        headers.set(M.ajaxHeader, M.ajaxValue);
        options.method = method;
        options.headers = headers;
        options.credentials = options.credentials || "same-origin";
        
        let response = await fetch(input, options);
        if (method === "GET" && response.status === 403) {
            const cacheKey = `${method}:${path}`;
            keySeedCache.delete(cacheKey);
            await new Promise((resolve) => setTimeout(resolve, M.apiRetryDelayMs));
            await seedApiCookies(path, method);
            response = await fetch(input, options);
        }
        return response;
    }

    window.sFetch = sFetch;
    window.secureApiFetch = sFetch;
  })();
  </script>

  <script>
  (function () {
    "use strict";

    const guard = {
      securityCheckPath: "/api/security-check",
      securityAlertPath: "/security-alert",
      ajaxHeader: "X-Sunny-Req",
      ajaxValue: "sunny",
      devtoolsThreshold: 170,
      devtoolsIntervalMs: 1500,
      requiredHits: 3,
      serverProbeIntervalMs: 30000,
      enabled: true,
      devtoolsEnabled: true,
      vpnEnabled: true,
    };

    function redirectToSecurity(reason) {
      if (window.location.pathname === guard.securityAlertPath) return;
      const nextUrl = new URL(guard.securityAlertPath, window.location.origin);
      if (reason) nextUrl.searchParams.set("reason", reason);
      window.location.replace(nextUrl.toString());
    }

    function isDevtoolsLikelyOpen() {
      const widthGap = window.outerWidth - window.innerWidth;
      const heightGap = window.outerHeight - window.innerHeight;
      return widthGap > guard.devtoolsThreshold || heightGap > guard.devtoolsThreshold;
    }

    async function runServerSecurityProbe() {
      try {
        const res = await fetch(guard.securityCheckPath, {
          method: "GET",
          credentials: "same-origin",
          headers: { [guard.ajaxHeader]: guard.ajaxValue },
        });
        if (!res.ok) return;
        const data = await res.json();
        
        guard.enabled = data.guard_enabled !== false;
        guard.devtoolsEnabled = data.devtools_block_enabled !== false;
        guard.vpnEnabled = data.vpn_block_enabled !== false;

        if (guard.enabled && guard.vpnEnabled && data.block) {
          redirectToSecurity(data.reason || "vpn_or_proxy_detected");
        }
      } catch (_err) {}
    }

    function startClientSecurityGuard() {
      if (window.location.pathname === guard.securityAlertPath) return;

      let devtoolsHits = 0;
      setInterval(() => {
        if (!guard.enabled || !guard.devtoolsEnabled) {
          devtoolsHits = 0;
          return;
        }
        if (isDevtoolsLikelyOpen()) {
          devtoolsHits += 1;
          if (devtoolsHits >= guard.requiredHits) {
            redirectToSecurity("devtools_detected");
          }
        } else {
          devtoolsHits = 0;
        }
      }, guard.devtoolsIntervalMs);

      runServerSecurityProbe();
      setInterval(runServerSecurityProbe, guard.serverProbeIntervalMs);
    }

    startClientSecurityGuard();
    
    // Security: Anti-Copy & Right-Click Protection
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
            e.preventDefault();
        }
    });
  })();
  </script>
