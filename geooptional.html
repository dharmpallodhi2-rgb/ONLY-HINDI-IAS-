<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geography Optional Chapters - ONLY HINDI IAS</title>
    <style>
        :root{--primary:#3b5098;--accent:#ffaa00;--bg:#f5f6f9;--white:#ffffff}
        body{margin:0;padding:0;background:var(--bg);font-family:sans-serif;user-select:none;-webkit-user-select:none}
        .header{background:var(--primary);padding:15px;display:flex;align-items:center;color:white;position:sticky;top:0;z-index:1000;border-bottom-left-radius:15px;border-bottom-right-radius:15px}
        .back-btn{background:var(--accent);width:35px;height:35px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;margin-right:15px;color:white;text-decoration:none;font-weight:bold}
        .grid{padding:15px;display:grid;grid-template-columns:1fr;gap:15px}
        .chapter-card{background:white;border-radius:12px;display:flex;align-items:center;padding:12px;box-shadow:0 3px 8px rgba(0,0,0,0.08);border-left:5px solid var(--accent);cursor:pointer}
        .chapter-info b{font-size:16px;color:var(--primary);display:block}
        .chapter-info p{font-size:11px;color:#777;margin-top:3px}
        .play-icon{margin-left:auto;color:var(--primary);font-size:20px}
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="header">
        <a href="batches.html" class="back-btn">⬅</a>
        <div>
            <b style="font-size:16px;display:block">Geography Optional (सचि‍न सर)</b>
            <span style="font-size:11px;color:var(--accent)">सभी चैप्टर्स की सूची</span>
        </div>
    </header>

    <main class="grid">
        <div class="chapter-card" onclick="window.location.href='geo-ch1.html'">
            <div class="chapter-info">
                <b>अध्याय 1: भू-आकृति विज्ञान (Geomorphology)</b>
                <p>कुल लेक्चर्स: 15 • नोट्स शामिल</p>
            </div>
            <div class="play-icon">📂</div>
        </div>

        <div class="chapter-card" onclick="window.location.href='geo-ch2.html'">
            <div class="chapter-info">
                <b>अध्याय 2: जलवायु विज्ञान (Climatology)</b>
                <p>कुल लेक्चर्स: 12 • नोट्स शामिल</p>
            </div>
            <div class="play-icon">📂</div>
        </div>

        <div class="chapter-card" onclick="window.location.href='geo-ch3.html'">
            <div class="chapter-info">
                <b>अध्याय 3: समुद्र विज्ञान (Oceanography)</b>
                <p>कुल लेक्चर्स: 10 • नोट्स शामिल</p>
            </div>
            <div class="play-icon">📂</div>
        </div>

        </main>

</body>
</html>
