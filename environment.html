        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }

        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #e0e0e0; }
        .thumb { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .badge { color: #d93838; font-size: 9px; font-weight: bold; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 6px; text-transform: uppercase; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
