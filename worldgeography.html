<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Geography | ONLY HINDI IAS</title>
    <style>
        :root { --primary: #3b5098; --accent: #ffaa00; --bg: #f5f6f9; --text: #222; }
        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        .header { background-color: var(--primary); padding: 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-circle { background-color: var(--accent); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-right: 15px; font-weight: bold; color: white; text-decoration: none; transition: 0.3s; }
        .back-circle:hover { transform: scale(1.1); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #eee; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; -webkit-user-drag: none; }
        .info { padding: 10px; }
        .badge { color: #d93838; font-size: 9px; font-weight: 700; border: 1px solid #d93838; padding: 2px 6px; border-radius: 4px; background: #fdf0f0; display: inline-block; margin-bottom: 6px; text-transform: uppercase; }
        .title { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @media (max-width: 480px) { .grid { gap: 10px; padding: 10px; } .title { font-size: 10px; } }
    </style>
</head>
