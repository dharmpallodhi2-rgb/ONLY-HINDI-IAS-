<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Player - ONLY HINDI IAS</title>
    <!-- Plyr & HLS Libraries -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 100%; height: auto; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: #ffaa00; color: white; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: bold; z-index: 10; font-family: sans-serif; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        :root { --plyr-color-main: #ffaa00; }
    </style>
</head>
<body oncontextmenu="return false">

    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>

    <div class="container">
        <video id="player" playsinline controls></video>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const source = params.get('url');
        const video = document.querySelector('video');

        if (source) {
            // YouTube Handler
            if (source.includes('youtube.com') || source.includes('embed')) {
                window.location.href = source; 
            } else {
                // HLS (.m3u8) Handler
                const defaultOptions = {};

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        const player = new Plyr(video, defaultOptions);
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    const player = new Plyr(video, defaultOptions);
                }
            }
        }

        // Security Protocol
        document.onkeydown = (e) => { 
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) return false; 
        };
    </script>
</body>
</html>
