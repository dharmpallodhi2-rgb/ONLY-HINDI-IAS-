<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Player - ONLY HINDI IAS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        video { width: 100%; height: 100%; outline: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: #ffaa00; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body oncontextmenu="return false">
    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>
    <div id="video-container" style="width: 100%; height: 100%;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('url');
        
        if (videoUrl) {
            const container = document.getElementById('video-container');
            
            if (videoUrl.includes('youtube.com') || videoUrl.includes('embed')) {
                container.innerHTML = `<iframe src="${videoUrl}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<video id="video" controls autoplay playsinline></video>`;
                const video = document.getElementById('video');
                
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(videoUrl);
                    hls.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoUrl;
                }
            }
        }

        // Security Protocol
        document.onkeydown = (e) => { 
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey)) return false; 
        };
    </script>
</body>
</html>
