<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLY HINDI IAS | Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* हेडर */
        .player-header { padding: 15px; display: flex; align-items: center; background: #1a1a1a; }
        .back-btn { background: #ffaa00; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; text-decoration: none; font-weight: bold; margin-right: 15px; }
        
        /* वीडियो एरिया */
        .video-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; }
        video { width: 100%; max-height: 100%; outline: none; }

        /* कंट्रोल पैनल (ब्लैक बैकग्राउंड) */
        .control-panel { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .label { font-size: 10px; color: #ffaa00; text-transform: uppercase; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="player-header">
        <a href="javascript:history.back()" class="back-btn">⬅</a>
        <div style="font-weight: bold;">ONLY HINDI IAS PLAYER</div>
    </div>

    <div class="video-wrapper">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <span class="label">Quality</span>
            <select id="qualitySel"><option value="-1">Auto</option></select>
        </div>
        <div class="control-group">
            <span class="label">Speed</span>
            <select id="speedSel" onchange="document.getElementById('video').playbackRate = this.value">
                <option value="1">1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySel = document.getElementById('qualitySel');
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');

        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                hls.levels.forEach((level, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.innerHTML = level.height + "p";
                    qualitySel.appendChild(opt);
                });
            });
            qualitySel.onchange = () => { hls.currentLevel = parseInt(qualitySel.value); };
        }
    </script>
</body>
</html>
